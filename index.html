<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDA.Render3D v4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0b10;overflow:hidden;font-family:'Inter',system-ui,sans-serif}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ── Drop Zone (shown before JSON loaded) ── */
#drop-screen{position:fixed;inset:0;z-index:100;background:#0c0b10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease}
#drop-screen.hidden{opacity:0;pointer-events:none}
.drop-zone{border:2px dashed rgba(14,116,144,0.4);border-radius:20px;padding:60px 80px;text-align:center;cursor:pointer;transition:all 0.3s ease;background:rgba(14,116,144,0.03);max-width:500px}
.drop-zone:hover,.drop-zone.drag-over{border-color:#0e7490;background:rgba(14,116,144,0.08);transform:translateY(-3px);box-shadow:0 12px 40px rgba(14,116,144,0.15)}
.drop-zone input{display:none}
.drop-title{font-size:28px;font-weight:800;color:#0e7490;letter-spacing:-0.03em;margin-bottom:8px}
.drop-sub{font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:20px}
.drop-icon{font-size:48px;opacity:0.4;margin-bottom:16px}
.drop-hint{font-size:11px;color:rgba(255,255,255,0.2);margin-top:16px}
.brand-tag{position:absolute;top:20px;left:24px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(14,116,144,0.5)}

/* ── HUD (shown during 3D) ── */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;font-family:'DM Mono',monospace,system-ui}
.hud-badge{background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:6px 12px;font-size:11px;color:rgba(255,255,255,0.5)}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.4)}
#crosshair::before{top:50%;left:0;right:0;height:1px}
#crosshair::after{left:50%;top:0;bottom:0;width:1px}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,255,255,0.4);font:0.7rem/1.5 sans-serif;padding:6px 16px;border-radius:20px;background:rgba(0,0,0,0.4);pointer-events:none}

/* ── Touch controls ── */
.joystick-zone{position:fixed;bottom:24px;left:24px;width:130px;height:130px;z-index:20;touch-action:none;display:none}
.joystick-ring{position:absolute;inset:0;border:2px solid rgba(255,255,255,0.12);border-radius:50%;background:rgba(0,0,0,0.15)}
.joystick-knob{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.25);left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
.look-zone{position:fixed;top:0;right:0;width:55%;height:100%;z-index:15;touch-action:none;display:none}

/* ── Describe box ── */
.describe-section{margin-top:32px;max-width:500px;width:100%}
.describe-or{color:rgba(255,255,255,0.2);font-size:12px;text-align:center;margin:20px 0;letter-spacing:0.1em;text-transform:uppercase}
.describe-box{width:100%;min-height:80px;max-height:160px;background:rgba(14,116,144,0.06);border:1px solid rgba(14,116,144,0.25);border-radius:12px;color:rgba(255,255,255,0.8);font:14px/1.6 'Inter',system-ui,sans-serif;padding:14px 16px;resize:vertical;outline:none;transition:border-color 0.3s}
.describe-box::placeholder{color:rgba(255,255,255,0.2)}
.describe-box:focus{border-color:rgba(14,116,144,0.6)}
.describe-btn{margin-top:12px;width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#0e7490,#155e75);color:white;font:600 14px/1 'Inter',system-ui,sans-serif;cursor:pointer;letter-spacing:0.02em;transition:all 0.2s}
.describe-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(14,116,144,0.4)}
.describe-btn:active{transform:translateY(0)}
.describe-examples{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.describe-chip{background:rgba(14,116,144,0.10);border:1px solid rgba(14,116,144,0.18);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.2s}
.describe-chip:hover{background:rgba(14,116,144,0.20);color:rgba(255,255,255,0.6)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Drop screen -->
<div id="drop-screen">
  <div class="brand-tag">SDA.Render3D</div>
  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">◈</div>
    <div class="drop-title">Drop Environment JSON</div>
    <div class="drop-sub">Declarative 3D — describe it, see it</div>
    <input type="file" id="file-input" accept=".json">
    <div class="drop-hint">or click to browse</div>
  </div>
  <div class="describe-section">
    <div class="describe-or">— or describe it —</div>
    <textarea class="describe-box" id="describe-input" placeholder="a large old warehouse with 6 rows of racking, 4 dock doors, an office, and 3 forklifts"></textarea>
    <button class="describe-btn" id="describe-btn">Build World</button>
    <div class="describe-examples">
      <span class="describe-chip" data-text="a small clean office building, 3 floors">office</span>
      <span class="describe-chip" data-text="a large old warehouse with 5 rows of racking, 6 dock doors, 3 forklifts, a break room, moody lighting">warehouse</span>
      <span class="describe-chip" data-text="a hospital floor with 2 wards, 8 beds each, a nurses station, clean and bright">hospital</span>
      <span class="describe-chip" data-text="a downtown block with 4 buildings, intersection, parking, trees, street lights, outdoor">downtown</span>
      <span class="describe-chip" data-text="a suburb neighborhood with 6 houses, a park, playground, pond, trees, outdoor">suburb</span>
      <span class="describe-chip" data-text="a strip mall with 5 stores, gas station, large parking lot, billboard, outdoor">strip mall</span>
      <span class="describe-chip" data-text="an abandoned factory, huge, very old, moody, mostly empty, 2 rows of racking">abandoned</span>
      <span class="describe-chip" data-text="a snowy park with pine trees, a frozen pond, playground, outdoor">winter park</span>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="crosshair"></div>
  <div style="position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:8px">
    <div id="hud-brand" style="padding:5px 12px;border-radius:5px;display:none">
      <span id="hud-logo" style="font-weight:800;font-size:14px"></span>
    </div>
    <span id="hud-subtitle" style="color:rgba(255,255,255,0.3);font-size:10px"></span>
  </div>
  <div class="hud-badge" style="position:absolute;top:12px;right:12px">
    <span id="fps">--</span> FPS | <span id="drawn">0</span> objs
  </div>
  <div id="pos" class="hud-badge" style="position:absolute;bottom:12px;left:12px">X:0 Z:0</div>
    <div id="door-hint" class="hud-badge" style="position:absolute;bottom:50px;left:50%;transform:translateX(-50%);opacity:0;transition:opacity 0.3s">🚪 <span id="door-name"></span></div>
</div>

<div id="hint" style="display:none">WASD move · Mouse look · Shift run · Click to lock + enable audio</div>
<div class="joystick-zone" id="joystick"><div class="joystick-ring"></div><div class="joystick-knob" id="knob"></div></div>
<div class="look-zone" id="look-zone"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════
// MATH
// ══════════════════════════════════════════════════
function persp(f,a,n,r){const t=1/Math.tan(f/2),d=1/(n-r);return new Float32Array([t/a,0,0,0,0,t,0,0,0,0,(r+n)*d,-1,0,0,2*r*n*d,0]);}
function look(e,c,u){let zx=e[0]-c[0],zy=e[1]-c[1],zz=e[2]-c[2],l=1/Math.sqrt(zx*zx+zy*zy+zz*zz);zx*=l;zy*=l;zz*=l;let xx=u[1]*zz-u[2]*zy,xy=u[2]*zx-u[0]*zz,xz=u[0]*zy-u[1]*zx;l=1/Math.sqrt(xx*xx+xy*xy+xz*xz);xx*=l;xy*=l;xz*=l;let yx=zy*xz-zz*xy,yy=zz*xx-zx*xz,yz=zx*xy-zy*xx;return new Float32Array([xx,yx,zx,0,xy,yy,zy,0,xz,yz,zz,0,-(xx*e[0]+xy*e[1]+xz*e[2]),-(yx*e[0]+yy*e[1]+yz*e[2]),-(zx*e[0]+zy*e[1]+zz*e[2]),1]);}
function m4m(a,b){const o=new Float32Array(16);for(let i=0;i<4;i++)for(let j=0;j<4;j++)o[j*4+i]=a[i]*b[j*4]+a[4+i]*b[j*4+1]+a[8+i]*b[j*4+2]+a[12+i]*b[j*4+3];return o;}

// ══════════════════════════════════════════════════
// MODEL — SDA state layer
// ══════════════════════════════════════════════════
class Model {
    constructor(init = {}) {
        this.state = structuredClone(init);
        this._observers = []; this._oid = 0;
        this._batching = false; this._bp = [];
    }
    get(path) {
        if (!path) return this.state;
        return path.split('.').reduce((o, k) => o && o[k] !== undefined ? o[k] : undefined, this.state);
    }
    set(path, value, opts = {}) {
        const keys = path.split('.'), last = keys.pop();
        const target = keys.reduce((o, k) => { if (!o[k] || typeof o[k] !== 'object') o[k] = {}; return o[k]; }, this.state);
        target[last] = value;
        if (this._batching) { this._bp.push(path); return; }
        if (!opts.silent) this.notify(path);
    }
    getState() { return this.state; }
    subscribe(cb, filter = null) {
        const id = ++this._oid;
        this._observers.push({ id, cb, filter });
        return () => { this._observers = this._observers.filter(o => o.id !== id); };
    }
    notify(path = '*') {
        this._observers.forEach(obs => {
            if (obs.filter && path !== '*' && !path.startsWith(obs.filter) && !obs.filter.startsWith(path)) return;
            try { obs.cb(this.state, { path }); } catch (e) { console.error('Observer:', e); }
        });
    }
    batch(fn) {
        this._batching = true; this._bp = [];
        try { fn(); } finally { this._batching = false; }
        const u = [...new Set(this._bp)];
        if (u.includes('*')) this.notify('*'); else u.forEach(p => this.notify(p));
        this._bp = [];
    }
}

// ══════════════════════════════════════════════════
// VIEW — DOM projections
// ══════════════════════════════════════════════════
class View {
    constructor() { this._projections = []; this._unsub = null; }
    addProjection(name, filter, fn) { this._projections.push({ name, filter, fn }); }
    observe(model) {
        if (this._unsub) this._unsub();
        this._unsub = model.subscribe((state, change) => {
            const p = change.path || '*';
            for (const proj of this._projections) {
                if (p === '*' || !proj.filter || p.startsWith(proj.filter) || proj.filter.startsWith(p))
                    try { proj.fn(state, change); } catch (e) { console.error('Projection [' + proj.name + ']:', e); }
            }
        });
    }
    stop() { if (this._unsub) { this._unsub(); this._unsub = null; } }
}

// ══════════════════════════════════════════════════
// MESH GENERATORS
// ══════════════════════════════════════════════════
function genCyl(seg){const V=[],I=[];for(let i=0;i<=seg;i++){const a=i/seg*Math.PI*2,c=Math.cos(a),s=Math.sin(a);V.push(c,-1,s,c,0,s);V.push(c,1,s,c,0,s);}for(let i=0;i<seg;i++){const b=i*2,t=b+1,bn=(i+1)*2,tn=bn+1;I.push(b,bn,t,t,bn,tn);}const tc=V.length/6;V.push(0,1,0,0,1,0);for(let i=0;i<=seg;i++){const a=i/seg*Math.PI*2;V.push(Math.cos(a),1,Math.sin(a),0,1,0);}for(let i=0;i<seg;i++)I.push(tc,tc+1+i,tc+2+i);const bc=V.length/6;V.push(0,-1,0,0,-1,0);for(let i=0;i<=seg;i++){const a=i/seg*Math.PI*2;V.push(Math.cos(a),-1,Math.sin(a),0,-1,0);}for(let i=0;i<seg;i++)I.push(bc,bc+2+i,bc+1+i);return{V:new Float32Array(V),I:new Uint16Array(I)};}

function genSphere(latS,lonS){const V=[],I=[];for(let la=0;la<=latS;la++){const th=la/latS*Math.PI,st=Math.sin(th),ct=Math.cos(th);for(let lo=0;lo<=lonS;lo++){const ph=lo/lonS*Math.PI*2,x=st*Math.cos(ph),y=ct,z=st*Math.sin(ph);V.push(x,y,z,x,y,z);}}for(let la=0;la<latS;la++)for(let lo=0;lo<lonS;lo++){const a=la*(lonS+1)+lo,b=a+lonS+1;I.push(a,b,a+1,a+1,b,b+1);}return{V:new Float32Array(V),I:new Uint16Array(I)};}

function genBevelBox(bev){const V=[],I=[];const b=bev,ib=1-b;function quad(v0,v1,v2,v3,nx,ny,nz){const base=V.length/6;V.push(v0[0],v0[1],v0[2],nx,ny,nz,v1[0],v1[1],v1[2],nx,ny,nz,v2[0],v2[1],v2[2],nx,ny,nz,v3[0],v3[1],v3[2],nx,ny,nz);I.push(base,base+1,base+2,base,base+2,base+3);}quad([-ib,-ib,1],[ib,-ib,1],[ib,ib,1],[-ib,ib,1],0,0,1);quad([ib,-ib,-1],[-ib,-ib,-1],[-ib,ib,-1],[ib,ib,-1],0,0,-1);quad([-ib,1,-ib],[ib,1,-ib],[ib,1,ib],[-ib,1,ib],0,1,0);quad([-ib,-1,ib],[ib,-1,ib],[ib,-1,-ib],[-ib,-1,-ib],0,-1,0);quad([1,-ib,-ib],[1,-ib,ib],[1,ib,ib],[1,ib,-ib],1,0,0);quad([-1,-ib,ib],[-1,-ib,-ib],[-1,ib,-ib],[-1,ib,ib],-1,0,0);const s=3;function edgeBevel(p0,p1,n0,n1){for(let i=0;i<s;i++){const a0=i/s*Math.PI*0.5,a1=(i+1)/s*Math.PI*0.5;const c0=Math.cos(a0),s0=Math.sin(a0),c1=Math.cos(a1),s1=Math.sin(a1);const o0=[p0[0]+n0[0]*b*c0+n1[0]*b*s0,p0[1]+n0[1]*b*c0+n1[1]*b*s0,p0[2]+n0[2]*b*c0+n1[2]*b*s0];const o1=[p1[0]+n0[0]*b*c0+n1[0]*b*s0,p1[1]+n0[1]*b*c0+n1[1]*b*s0,p1[2]+n0[2]*b*c0+n1[2]*b*s0];const o2=[p1[0]+n0[0]*b*c1+n1[0]*b*s1,p1[1]+n0[1]*b*c1+n1[1]*b*s1,p1[2]+n0[2]*b*c1+n1[2]*b*s1];const o3=[p0[0]+n0[0]*b*c1+n1[0]*b*s1,p0[1]+n0[1]*b*c1+n1[1]*b*s1,p0[2]+n0[2]*b*c1+n1[2]*b*s1];const nmx=n0[0]*(c0+c1)+n1[0]*(s0+s1),nmy=n0[1]*(c0+c1)+n1[1]*(s0+s1),nmz=n0[2]*(c0+c1)+n1[2]*(s0+s1);const nl=Math.sqrt(nmx*nmx+nmy*nmy+nmz*nmz)||1;quad(o0,o1,o2,o3,nmx/nl,nmy/nl,nmz/nl);}}edgeBevel([-ib,ib,-ib],[-ib,ib,ib],[0,1,0],[-1,0,0]);edgeBevel([ib,ib,-ib],[ib,ib,ib],[0,1,0],[1,0,0]);edgeBevel([-ib,-ib,-ib],[-ib,-ib,ib],[0,-1,0],[-1,0,0]);edgeBevel([ib,-ib,-ib],[ib,-ib,ib],[0,-1,0],[1,0,0]);edgeBevel([-ib,ib,ib],[ib,ib,ib],[0,1,0],[0,0,1]);edgeBevel([-ib,ib,-ib],[ib,ib,-ib],[0,1,0],[0,0,-1]);edgeBevel([-ib,-ib,ib],[ib,-ib,ib],[0,-1,0],[0,0,1]);edgeBevel([-ib,-ib,-ib],[ib,-ib,-ib],[0,-1,0],[0,0,-1]);edgeBevel([-ib,-ib,ib],[-ib,ib,ib],[-1,0,0],[0,0,1]);edgeBevel([ib,-ib,ib],[ib,ib,ib],[1,0,0],[0,0,1]);edgeBevel([-ib,-ib,-ib],[-ib,ib,-ib],[-1,0,0],[0,0,-1]);edgeBevel([ib,-ib,-ib],[ib,ib,-ib],[1,0,0],[0,0,-1]);return{V:new Float32Array(V),I:new Uint16Array(I)};}

function genHumanoid(){const V=[],I=[];const SEG=16;
function cross(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function nm(v){const l=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);return l>1e-6?[v[0]/l,v[1]/l,v[2]/l]:[0,1,0];}
function addRing(cx,cy,cz,ux,uy,uz,r){
    const up=nm([ux,uy,uz]);let right;
    if(Math.abs(up[1])<0.92)right=nm(cross([0,1,0],up));else right=nm(cross([0,0,1],up));
    const fwd=cross(up,right);const base=V.length/6;
    for(let i=0;i<=SEG;i++){const a=i/SEG*Math.PI*2,c=Math.cos(a),s=Math.sin(a);
    const nx=right[0]*c+fwd[0]*s,ny=right[1]*c+fwd[1]*s,nz=right[2]*c+fwd[2]*s;
    V.push(cx+nx*r,cy+ny*r,cz+nz*r,nx,ny,nz);}return base;}
function connect(b1,b2){for(let i=0;i<SEG;i++)I.push(b1+i,b2+i,b1+i+1,b1+i+1,b2+i,b2+i+1);}
function cap(base,cx,cy,cz,nx,ny,nz,dir){const ci=V.length/6;V.push(cx,cy,cz,nx,ny,nz);
for(let i=0;i<SEG;i++){if(dir>0)I.push(ci,base+i,base+i+1);else I.push(ci,base+i+1,base+i);}}
function limb(joints){const rings=[];
for(let j=0;j<joints.length;j++){const p=joints[j];let dx,dy,dz;
if(j<joints.length-1){dx=joints[j+1].x-p.x;dy=joints[j+1].y-p.y;dz=joints[j+1].z-p.z;}
else{dx=p.x-joints[j-1].x;dy=p.y-joints[j-1].y;dz=p.z-joints[j-1].z;}
rings.push(addRing(p.x,p.y,p.z,dx,dy,dz,p.r));}
for(let i=0;i<rings.length-1;i++)connect(rings[i],rings[i+1]);
const j0=joints[0],j1=joints[1],jn=joints[joints.length-1],jp=joints[joints.length-2];
let dx=j1.x-j0.x,dy=j1.y-j0.y,dz=j1.z-j0.z,l=Math.sqrt(dx*dx+dy*dy+dz*dz);
cap(rings[0],j0.x,j0.y,j0.z,-dx/l,-dy/l,-dz/l,-1);
dx=jn.x-jp.x;dy=jn.y-jp.y;dz=jn.z-jp.z;l=Math.sqrt(dx*dx+dy*dy+dz*dz);
cap(rings[rings.length-1],jn.x,jn.y,jn.z,dx/l,dy/l,dz/l,1);}

// Head
limb([{x:0,y:1.43,z:0,r:0.058},{x:0,y:1.48,z:0.003,r:0.072},{x:0,y:1.53,z:0.008,r:0.095},{x:0,y:1.58,z:0.010,r:0.108},{x:0,y:1.63,z:0.006,r:0.112},{x:0,y:1.68,z:0.002,r:0.110},{x:0,y:1.73,z:-0.005,r:0.100},{x:0,y:1.78,z:-0.012,r:0.075},{x:0,y:1.82,z:-0.018,r:0.040}]);
// Nose
limb([{x:0,y:1.65,z:0.105,r:0.018},{x:0,y:1.63,z:0.118,r:0.015},{x:0,y:1.61,z:0.112,r:0.016}]);
// ── BEARD ──
// Chin — center front, slight forward protrusion
limb([{x:0,y:1.56,z:0.098,r:0.028},{x:0,y:1.53,z:0.105,r:0.035},{x:0,y:1.50,z:0.095,r:0.038},{x:0,y:1.48,z:0.075,r:0.032}]);
// Left jaw line — cheek to chin
limb([{x:-0.06,y:1.59,z:0.075,r:0.022},{x:-0.08,y:1.56,z:0.082,r:0.025},{x:-0.07,y:1.53,z:0.088,r:0.026},{x:-0.05,y:1.50,z:0.080,r:0.024}]);
// Right jaw line
limb([{x:0.06,y:1.59,z:0.075,r:0.022},{x:0.08,y:1.56,z:0.082,r:0.025},{x:0.07,y:1.53,z:0.088,r:0.026},{x:0.05,y:1.50,z:0.080,r:0.024}]);
// Under-chin fill — connects chin to throat
limb([{x:0,y:1.50,z:0.06,r:0.035},{x:0,y:1.48,z:0.04,r:0.040},{x:0,y:1.46,z:0.02,r:0.035}]);
// Mustache — two small tubes flanking nose
limb([{x:-0.02,y:1.61,z:0.108,r:0.012},{x:-0.03,y:1.60,z:0.105,r:0.010},{x:-0.04,y:1.59,z:0.095,r:0.008}]);

let _seed = 42;
function rng() { _seed = (_seed * 1103515245 + 12345) & 0x7fffffff; return (_seed >> 16) / 32767; }
function resetRng(s) { _seed = s || 42; }

function add(O, x,y,z, sx,sy,sz, r,g,b, rough,metal, mesh) {
    O.push({ x, y, z, sx, sy, sz, r, g, b, rough: rough??0.7, metal: metal??0, mesh: mesh??0 });
}
function shadow(O, x,z, sx,sz) { add(O, x,0.006,z, sx,0.001,sz, 0.12,0.11,0.10, 0.95,0); }


// ── ENVELOPE ─────────────────────────────────────
function genEnvelope(O, space, meta) {
    const W = space.width, D = space.depth, H = space.height;
    const hw = W/2, hd = D/2;
    const age = space.age || 0;
    const ageFactor = Math.min(age / 20, 1); // 0-1

    // Floor
    const fc = space.floor === 'polished' ? [0.52,0.50,0.48] : [0.42-ageFactor*0.04, 0.40-ageFactor*0.04, 0.38-ageFactor*0.03];
    add(O, 0,-0.05,0, W,0.1,D, fc[0],fc[1],fc[2], 0.95,0);

    // Ceiling
    const cc = [0.82-ageFactor*0.04, 0.79-ageFactor*0.05, 0.73-ageFactor*0.06];
    add(O, 0,H,0, W,0.15,D, cc[0],cc[1],cc[2], 0.65,0);

    // Walls
    add(O, hw,H/2,0, 0.25,H,D, 0.75,0.73,0.69, 0.8,0);
    add(O, -hw,H/2,0, 0.25,H,D, 0.74,0.72,0.68, 0.8,0);
    add(O, 0,H/2,-hd, W,H,0.25, 0.76,0.74,0.70, 0.8,0);
    add(O, 0,H*0.7,hd, W,H*0.6,0.3, 0.73,0.71,0.67, 0.8,0); // dock wall

    // Expansion joints
    for (let fx=-hw+10; fx<hw; fx+=10) add(O, fx,0.005,0, 0.03,0.005,D, 0.35,0.33,0.31, 0.9,0);
    for (let fz=-hd+10; fz<hd; fz+=10) add(O, 0,0.005,fz, W,0.005,0.03, 0.35,0.33,0.31, 0.9,0);

    // Floor aging
    if (ageFactor > 0) {
        for (let i=0; i<Math.floor(12*ageFactor); i++) {
            add(O, -20+rng()*40, 0.003, -30+rng()*55, 0.08+rng()*0.05,0.002,3+rng()*8, 0.28,0.26,0.24, 0.95,0);
        }
        // Oil stains
        if (ageFactor > 0.3) {
            add(O, -15,0.003,hd-12, 1.8,0.002,2.5, 0.22,0.20,0.19, 0.8,0);
            add(O, 8,0.003,hd-16, 1.2,0.002,1.8, 0.24,0.22,0.20, 0.8,0);
        }
        // Worn zone near dock
        add(O, 0,0.004,hd-12, W*0.6,0.002,8, 0.40,0.38,0.36, 0.95,0);
    }

    // Wall baseboard dirt
    if (ageFactor > 0.1) {
        add(O, hw-0.01,0.3,0, 0.02,0.6,D, 0.42,0.40,0.36, 0.9,0);
        add(O, -hw+0.01,0.3,0, 0.02,0.6,D, 0.42,0.40,0.36, 0.9,0);
        add(O, 0,0.3,-hd+0.01, W,0.6,0.02, 0.42,0.40,0.36, 0.9,0);
    }

    // Wall pilasters
    for (let wz=-hd+5; wz<hd; wz+=12) {
        add(O, hw-0.15,H/2,wz, 0.5,H,0.5, 0.76,0.74,0.72, 0.8,0);
        add(O, -hw+0.15,H/2,wz, 0.5,H,0.5, 0.76,0.74,0.72, 0.8,0);
    }

    // Structural columns
    if (space.columns) {
        const cs = space.columns.spacing, inset = space.columns.inset || 10;
        const isMetal = space.columns.material === 'steel';
        for (let cx=-hw+inset; cx<hw; cx+=cs[0]) {
            for (let cz=-hd+inset; cz<hd-10; cz+=cs[1]) {
                if (isMetal) add(O, cx,H/2,cz, 0.35,H,0.35, 0.60,0.60,0.62, 0.4,0.8);
                else add(O, cx,H/2,cz, 0.5,H,0.5, 0.70,0.68,0.65, 0.8,0);
            }
        }
    }

    // Ceiling lights
    for (let lx=-hw+5; lx<hw; lx+=10) {
        for (let lz=-hd+6; lz<hd-5; lz+=12) {
            add(O, lx,H-0.12,lz, 1.4,0.10,0.40, 0.72,0.72,0.75, 0.3,0.7);
            add(O, lx,H-0.24,lz, 1.2,0.04,0.32, 1.0,0.97,0.90, 0.1,0);
        }
    }

    // Signage on north wall
    add(O, 0,H-1.5,-hd+0.15, 7,1.2,0.10, 0.0,0.44,0.81, 0.3,0.1);
}


// ── RACKING ──────────────────────────────────────
function genRacking(O, zone, space) {
    const W = space.width, D = space.depth, H = space.height;
    const hw = W/2, hd = D/2;
    const rows = zone.rows || 4;
    const levels = zone.levels || 4;
    const rH = H * 0.8;
    const rD = 1.3;
    const aisleW = zone.aisleWidth || 3.8;
    const rSp = rD*2 + aisleW;
    const fill = zone.fill || 0.8;
    const bayL = zone.bayLength || 2.7;

    // Compute region
    let rSX, rSZ, rEZ;
    if (zone.region) {
        rSX = zone.region.x ? zone.region.x[0] : -hw + 8;
        rSZ = zone.region.z ? zone.region.z[0] : -hd + 8;
        rEZ = zone.region.z ? zone.region.z[1] : hd - 18;
    } else {
        rSX = -hw + 8;
        rSZ = -hd + 8;
        rEZ = hd - 18;
    }
    const rLen = rEZ - rSZ;
    const nBays = Math.floor(rLen / bayL);

    for (let row = 0; row < rows; row++) {
        const rx = rSX + row * rSp;
        shadow(O, rx, (rSZ+rEZ)/2, rD*2.2, rLen);

        for (let side = 0; side < 2; side++) {
            const sx = rx + (side === 0 ? -rD*0.55 : rD*0.55);

            // Uprights
            for (let s = 0; s <= nBays; s += 2) {
                const uz = rSZ + s * bayL;
                const steelAge = rng()*0.12 - 0.06;
                const sr = 0.50+steelAge, sg = 0.52+steelAge*0.8, sb = 0.55+steelAge*0.5;
                add(O, sx-rD*0.35,rH/2,uz, 0.10,rH,0.10, sr,sg,sb, 0.25+rng()*0.15, 0.85);
                add(O, sx+rD*0.35,rH/2,uz, 0.10,rH,0.10, sr,sg,sb, 0.25+rng()*0.15, 0.85);
            }

            // Beams + wire deck per level
            for (let lvl = 1; lvl <= levels; lvl++) {
                const by = lvl * (rH / (levels+0.5)) + 0.2;
                const beamFade = rng() * 0.15;
                const br = 0.88-beamFade*0.3, bg = 0.55-beamFade*0.2, bb = 0.06+beamFade*0.04;
                add(O, sx-rD*0.32,by,(rSZ+rEZ)/2, 0.07,0.14,rLen, br,bg,bb, 0.35+rng()*0.15, 0.7);
                add(O, sx+rD*0.32,by,(rSZ+rEZ)/2, 0.07,0.14,rLen, br,bg,bb, 0.35+rng()*0.15, 0.7);
                // Wire deck
                add(O, sx,by+0.08,(rSZ+rEZ)/2, rD*0.6,0.02,rLen, 0.55+rng()*0.08,0.55+rng()*0.06,0.58, 0.4,0.7);
            }

            // Cargo per bay
            for (let lvl = 1; lvl <= Math.min(levels, 3); lvl++) {
                const by = lvl * (rH / (levels+0.5)) + 0.2;
                for (let b = 0; b < nBays; b++) {
                    if (rng() > fill) continue;
                    const bz = rSZ + b * bayL + bayL/2;
                    // Pallet
                    add(O, sx,by+0.10,bz, rD*0.85,0.14,bayL*0.9, 0.42+rng()*0.14,0.30+rng()*0.08,0.12+rng()*0.04, 0.85+rng()*0.1, 0);
                    // Cargo box
                    const bh = 0.4 + rng()*0.7;
                    const ct = Math.floor(rng()*6);
                    let cr,cg,cb,crough;
                    if (ct===0) { cr=0.72+rng()*0.06; cg=0.58+rng()*0.06; cb=0.40+rng()*0.05; crough=0.85; }
                    else if (ct===1) { cr=0.52+rng()*0.08; cg=0.40+rng()*0.06; cb=0.25+rng()*0.04; crough=0.9; }
                    else if (ct===2) { cr=0.88+rng()*0.08; cg=0.88+rng()*0.06; cb=0.86+rng()*0.06; crough=0.2; }
                    else if (ct===3) { cr=0.12+rng()*0.08; cg=0.28+rng()*0.10; cb=0.58+rng()*0.15; crough=0.45; }
                    else if (ct===4) { cr=0.65+rng()*0.15; cg=0.12+rng()*0.08; cb=0.10+rng()*0.06; crough=0.7; }
                    else { cr=0.55+rng()*0.20; cg=0.45+rng()*0.20; cb=0.35+rng()*0.20; crough=0.75; }
                    add(O, sx,by+0.17+bh/2,bz, rD*(0.70+rng()*0.12),bh,bayL*(0.78+rng()*0.10), cr,cg,cb, crough, 0);
                }
            }
        }

        // Aisle stripe
        add(O, rx,0.009,(rSZ+rEZ)/2, 0.12,0.005,rLen, 0.92,0.82,0.08, 0.6,0);
        // End guards
        add(O, rx-aisleW/2+0.15,0.4,rSZ-0.5, 0.15,0.8,0.15, 0.95,0.85,0.05, 0.4,0.6);
        add(O, rx+aisleW/2-0.15,0.4,rSZ-0.5, 0.15,0.8,0.15, 0.95,0.85,0.05, 0.4,0.6);
    }

    // Store racking info for agent routing
    return { rSX, rSp, rSZ, rEZ, rows, aisleW };
}


// ── DOCK ─────────────────────────────────────────
function genDock(O, zone, space) {
    const W = space.width, D = space.depth, H = space.height;
    const hw = W/2, hd = D/2;
    const n = zone.count || 4;
    const doorW = zone.doorWidth || 3.2;
    const doorH = zone.doorHeight || 4.0;
    const dockSp = (W - 8) / n;
    const wallZ = zone.wall === 'north' ? -hd : hd;
    const sign = zone.wall === 'north' ? -1 : 1;

    for (let i = 0; i < n; i++) {
        const dx = -hw + 5 + i*dockSp + dockSp/2;
        // Frame, door, plate, leveler
        add(O, dx,doorH/2,wallZ-sign*0.05, doorW+0.4,doorH+0.3,0.12, 0.85,0.70,0.08, 0.5,0.5);
        add(O, dx,doorH/2,wallZ-sign*0.15, doorW,doorH,0.06, 0.55,0.55,0.55, 0.4,0.6);
        add(O, dx,doorH+0.5,wallZ-sign*0.02, 0.7,0.4,0.04, 0.0,0.44,0.81, 0.3,0.1);
        add(O, dx,0.12,wallZ+sign*1.2, doorW+0.8,0.24,2.4, 0.50,0.48,0.45, 0.9,0);
        // Bollards
        add(O, dx-2,0.45,wallZ-sign*3.5, 0.14,0.9,0.14, 0.95,0.85,0.05, 0.4,0.6);
        add(O, dx+2,0.45,wallZ-sign*3.5, 0.14,0.9,0.14, 0.95,0.85,0.05, 0.4,0.6);
        // Bumpers
        add(O, dx-1,1.2,wallZ+sign*0.1, 0.30,1.0,0.20, 0.08,0.08,0.08, 0.9,0.05);
        add(O, dx+1,1.2,wallZ+sign*0.1, 0.30,1.0,0.20, 0.08,0.08,0.08, 0.9,0.05);
        // Fill wall between doors
        if (i > 0) add(O, dx-dockSp/2,doorH/2,wallZ, dockSp-doorW-0.4,doorH,0.3, 0.82,0.80,0.77, 0.75,0);
    }
    // Safety line
    add(O, 0,0.008,wallZ-sign*5, W-4,0.004,0.12, 0.92,0.80,0.08, 0.6,0);
}

    shadow(O, px,pz, 1.4,2.4);
    add(O, px-0.22,0.06,pz, 0.08,0.04,1.4, 0.40,0.40,0.43, 0.3,0.85);
    add(O, px+0.22,0.06,pz, 0.08,0.04,1.4, 0.40,0.40,0.43, 0.3,0.85);
    add(O, px,0.16,pz-0.6, 0.32,0.14,0.45, 0.40,0.40,0.43, 0.35,0.8);
    add(O, px,0.50,pz-0.85, 0.04,0.70,0.04, 0.35,0.35,0.38, 0.4,0.75);
    add(O, px,0.88,pz-0.85, 0.25,0.04,0.04, 0.35,0.35,0.38, 0.4,0.75);
}


// ── STAGING ──────────────────────────────────────
function genStaging(O, zone, space) {
    const hw = space.width/2, hd = space.depth/2;
    const z1 = zone.region?.z?.[0] ?? hd-15;
    const z2 = zone.region?.z?.[1] ?? hd-8;
    const nRows = zone.rows || 1;
    const fill = zone.fill || 0.8;
    const colors = [[0.68,0.55,0.38],[0.85,0.85,0.82],[0.50,0.38,0.24],[0.15,0.30,0.55],[0.65,0.15,0.12],[0.80,0.70,0.15]];

    for (let row = 0; row < nRows; row++) {
        const rz = z1 + row * 4;
        for (let i = 0; i < 8; i++) {
            const px = -18 + i * 5;
            shadow(O, px, rz, 1.6, 1.4);
            add(O, px,0.07,rz, 1.2,0.15,1.0, 0.45+rng()*0.10,0.33+rng()*0.08,0.14+rng()*0.06, 0.9,0);
            if (rng() < fill) {
                const sc = colors[Math.floor(rng()*colors.length)];
                const bh = 0.4+rng()*0.7;
                add(O, px,0.22+bh/2,rz, 1.05,bh,0.92, sc[0]+rng()*0.05,sc[1]+rng()*0.04,sc[2]+rng()*0.03, 0.7,0);
            }
        }
    }
}


// ── SAFETY ───────────────────────────────────────
function genSafety(O, zone, space) {
    const hw = space.width/2, hd = space.depth/2, H = space.height;
    const feSpacing = zone?.fireExtinguishers?.spacing || 18;

    // Fire extinguishers on walls
    for (let fz=-hd+8; fz<hd-5; fz+=feSpacing) {
        add(O, hw-0.18,1.0,fz, 0.14,0.50,0.14, 0.85,0.10,0.08, 0.5,0.5, 1);
        add(O, -hw+0.18,1.0,fz, 0.14,0.50,0.14, 0.85,0.10,0.08, 0.5,0.5, 1);
    }

    // Exit signs
    function exitSign(x,y,z,sx,sy,sz) { add(O, x,y,z, sx,sy,sz, 0.0,0.75,0.15, 0.15,0, 3); }
    exitSign(-hw+0.2,H-0.6,-hd+10, 0.06,0.30,0.55);
    exitSign(-hw+0.2,H-0.6,hd-12, 0.06,0.30,0.55);
    exitSign(hw-0.2,H-0.6,-hd+15, 0.06,0.30,0.55);
    exitSign(hw-0.2,H-0.6,hd-8, 0.06,0.30,0.55);

    // AED
    add(O, 0,1.4,-hd+0.15, 0.50,0.40,0.12, 0.85,0.85,0.88, 0.4,0.3, 3);
    add(O, 0,1.4,-hd+0.22, 0.44,0.34,0.02, 0.15,0.60,0.20, 0.3,0.1);
}


// ── OVERHEAD ─────────────────────────────────────
function genOverhead(O, zone, space) {
    const hw = space.width/2, hd = space.depth/2, H = space.height;

    if (zone.fireSuppression) {
        // Main trunk
        add(O, 0,H-0.6,0, space.width-8,0.18,0.18, 0.72,0.15,0.12, 0.35,0.7, 1);
        // Branches
        for (let px=-hw+12; px<hw; px+=15) {
            add(O, px,H-0.6,0, 0.18,0.18,space.depth-10, 0.72,0.15,0.12, 0.35,0.7, 1);
            for (let sz=-hd+8; sz<hd-8; sz+=4) {
                add(O, px,H-0.9,sz, 0.04,0.40,0.04, 0.60,0.58,0.55, 0.3,0.8, 1);
                add(O, px,H-1.15,sz, 0.12,0.06,0.12, 0.70,0.65,0.55, 0.25,0.7);
            }
        }
    }

    // Electrical conduit
    add(O, hw-0.35,3.0,0, 0.06,0.06,space.depth-6, 0.50,0.50,0.52, 0.25,0.8, 1);
    add(O, -hw+0.35,3.0,0, 0.06,0.06,space.depth-6, 0.50,0.50,0.52, 0.25,0.8, 1);
}


// ── ROOM v2 — door cutouts, windows, interactive doors ──
function genRoom(O, zone, space, doors) {
    const [x1,z1,x2,z2] = zone.bounds;
    const rh = zone.height || 3;
    const cx=(x1+x2)/2, cz=(z1+z2)/2;
    const wx=x2-x1, wz=z2-z1;
    const t=0.18;
    const wc = [0.82,0.80,0.77];
    const doorW = 1.2, doorH = 2.2;
    const door = zone.door || {};
    const dWall = door.wall || 'east';
    const dPos = door.position ?? cz;
    const hasWindows = zone.windows !== false;

    // Ceiling + light
    add(O, cx,rh,cz, wx+t,0.12,wz+t, wc[0]-0.05,wc[1]-0.04,wc[2]-0.03, 0.65,0);
    add(O, cx,rh-0.12,cz, 1.0,0.03,0.3, 1.0,0.97,0.90, 0.1,0);

    // Floor (slightly different tone)
    add(O, cx,0.005,cz, wx,0.01,wz, 0.55,0.53,0.50, 0.7,0);

    // Helper: wall with door cutout
    // wallAxis: 'x' means wall runs along x axis (north/south wall), 'z' means along z axis (east/west wall)
    function wallWithDoor(wallX, wallZ, wallLen, wallAxis, doorCenter) {
        const halfDoor = doorW / 2;
        if (wallAxis === 'x') {
            // Wall runs in X direction at fixed Z=wallZ
            const leftEnd = doorCenter - halfDoor;
            const rightEnd = doorCenter + halfDoor;
            const leftLen = leftEnd - (cx - wx/2);
            const rightLen = (cx + wx/2) - rightEnd;
            // Left segment
            if (leftLen > 0.1) add(O, cx-wx/2+leftLen/2, rh/2, wallZ, leftLen, rh, t, wc[0],wc[1],wc[2], 0.7, 0);
            // Right segment
            if (rightLen > 0.1) add(O, cx+wx/2-rightLen/2, rh/2, wallZ, rightLen, rh, t, wc[0],wc[1],wc[2], 0.7, 0);
            // Header above door
            const headerH = rh - doorH;
            if (headerH > 0.1) add(O, doorCenter, doorH+headerH/2, wallZ, doorW+0.1, headerH, t, wc[0],wc[1],wc[2], 0.7, 0);
            // Door frame
            add(O, doorCenter-halfDoor-0.04, doorH/2, wallZ, 0.08, doorH, t+0.04, 0.45,0.45,0.48, 0.4, 0.6);
            add(O, doorCenter+halfDoor+0.04, doorH/2, wallZ, 0.08, doorH, t+0.04, 0.45,0.45,0.48, 0.4, 0.6);
            add(O, doorCenter, doorH+0.04, wallZ, doorW+0.16, 0.08, t+0.04, 0.45,0.45,0.48, 0.4, 0.6);
            // Door sign
            add(O, doorCenter, doorH+0.3, wallZ+(t/2+0.04)*(wallZ>cz?1:-1), 0.50, 0.20, 0.03, 0.0,0.44,0.81, 0.3, 0.1);
            // Interactive door panel
            if (doors) doors.push({ x:doorCenter, y:doorH/2, z:wallZ, w:doorW-0.06, h:doorH-0.04, d:0.06, axis:'y', range:3.0, open:0, name:zone.name });
        } else {
            // Wall runs in Z direction at fixed X=wallX
            const leftEnd = doorCenter - halfDoor;
            const rightEnd = doorCenter + halfDoor;
            const leftLen = leftEnd - (cz - wz/2);
            const rightLen = (cz + wz/2) - rightEnd;
            if (leftLen > 0.1) add(O, wallX, rh/2, cz-wz/2+leftLen/2, t, rh, leftLen, wc[0],wc[1],wc[2], 0.7, 0);
            if (rightLen > 0.1) add(O, wallX, rh/2, cz+wz/2-rightLen/2, t, rh, rightLen, wc[0],wc[1],wc[2], 0.7, 0);
            const headerH = rh - doorH;
            if (headerH > 0.1) add(O, wallX, doorH+headerH/2, doorCenter, t, headerH, doorW+0.1, wc[0],wc[1],wc[2], 0.7, 0);
            add(O, wallX, doorH/2, doorCenter-halfDoor-0.04, t+0.04, doorH, 0.08, 0.45,0.45,0.48, 0.4, 0.6);
            add(O, wallX, doorH/2, doorCenter+halfDoor+0.04, t+0.04, doorH, 0.08, 0.45,0.45,0.48, 0.4, 0.6);
            add(O, wallX, doorH+0.04, doorCenter, t+0.04, 0.08, doorW+0.16, 0.45,0.45,0.48, 0.4, 0.6);
            add(O, wallX+(t/2+0.04)*(wallX>cx?1:-1), doorH+0.3, doorCenter, 0.03, 0.20, 0.50, 0.0,0.44,0.81, 0.3, 0.1);
            if (doors) doors.push({ x:wallX, y:doorH/2, z:doorCenter, w:0.06, h:doorH-0.04, d:doorW-0.06, axis:'y', range:3.0, open:0, name:zone.name });
        }
    }

    // Solid wall helper
    function solidWall(wallX, wallZ, len, axis) {
        if (axis === 'x') add(O, cx, rh/2, wallZ, wx, rh, t, wc[0],wc[1],wc[2], 0.7, 0);
        else add(O, wallX, rh/2, cz, t, rh, wz, wc[0],wc[1],wc[2], 0.7, 0);
    }

    // Build 4 walls — one has a door cutout
    if (dWall === 'north') { wallWithDoor(0, z1, wx, 'x', dPos); solidWall(0,z2,wx,'x'); solidWall(x1,0,wz,'z'); solidWall(x2,0,wz,'z'); }
    else if (dWall === 'south') { solidWall(0,z1,wx,'x'); wallWithDoor(0, z2, wx, 'x', dPos); solidWall(x1,0,wz,'z'); solidWall(x2,0,wz,'z'); }
    else if (dWall === 'west') { solidWall(0,z1,wx,'x'); solidWall(0,z2,wx,'x'); wallWithDoor(x1, 0, wz, 'z', dPos); solidWall(x2,0,wz,'z'); }
    else { /* east */ solidWall(0,z1,wx,'x'); solidWall(0,z2,wx,'x'); solidWall(x1,0,wz,'z'); wallWithDoor(x2, 0, wz, 'z', dPos); }

    // Windows on exterior-facing walls (if room touches building edge)
    if (hasWindows) {
        const hw = (space?.width||100)/2, hd = (space?.depth||100)/2;
        const winW = 1.0, winH = 1.0, winY = rh*0.55;
        const winSpacing = 3.0;
        // Check each wall for exterior adjacency
        if (Math.abs(x1 + hw) < 1 && dWall !== 'west') { // west exterior
            for (let wz2=z1+1.5; wz2<z2-1; wz2+=winSpacing)
                add(O, x1-0.02, winY, wz2, 0.04, winH, winW, 0.22,0.28,0.35, 0.08, 0.15);
        }
        if (Math.abs(x2 - hw) < 1 && dWall !== 'east') {
            for (let wz2=z1+1.5; wz2<z2-1; wz2+=winSpacing)
                add(O, x2+0.02, winY, wz2, 0.04, winH, winW, 0.22,0.28,0.35, 0.08, 0.15);
        }
        if (Math.abs(z1 + hd) < 1 && dWall !== 'north') {
            for (let wx2=x1+1.5; wx2<x2-1; wx2+=winSpacing)
                add(O, wx2, winY, z1-0.02, winW, winH, 0.04, 0.22,0.28,0.35, 0.08, 0.15);
        }
    }

    // Furniture
    if (zone.furniture === 'office') {
        add(O, cx,0.38,cz-wz*0.15, 1.4,0.06,0.7, 0.55,0.45,0.30, 0.7,0.1);
        add(O, cx,0.60,cz-wz*0.15-0.5, 0.4,0.45,0.4, 0.22,0.22,0.25, 0.5,0.3);
        add(O, cx,0.38+0.22,cz-wz*0.15+0.2, 0.50,0.35,0.04, 0.12,0.12,0.14, 0.3,0.4); // monitor
        // Filing cabinet
        add(O, cx+wx*0.3,0.55,cz+wz*0.3, 0.45,1.1,0.55, 0.50,0.50,0.52, 0.4,0.6, 3);
        // Whiteboard on wall
        add(O, cx,rh*0.55,z1+t/2+0.04, wx*0.5,rh*0.3,0.04, 0.92,0.92,0.94, 0.2,0.1);
    } else if (zone.furniture === 'breakroom') {
        add(O, cx,0.38,cz, 1.0,0.06,1.0, 0.80,0.78,0.75, 0.5,0.3);
        // Chairs around table
        for (const off of [[-0.6,0],[0.6,0],[0,-0.6],[0,0.6]])
            add(O, cx+off[0]*1.2,0.25,cz+off[1]*1.2, 0.38,0.04,0.38, 0.22+rng()*0.04,0.22+rng()*0.03,0.28+rng()*0.04, 0.6,0.1);
        // Vending machine
        add(O, x1+0.4,0.9,z1+0.5, 0.65,1.8,0.55, 0.20,0.20,0.22, 0.4,0.5, 3);
        add(O, x1+0.4,0.95,z1+0.22, 0.55,0.6,0.02, 0.15,0.20,0.28, 0.08,0.15); // vending glass
        // Microwave
        add(O, x2-0.5,0.82+0.16,z1+0.5, 0.50,0.32,0.40, 0.75,0.75,0.78, 0.4,0.4, 3);
        // Counter
        add(O, x2-0.5,0.82,z1+0.8, 0.60,0.05,1.2, 0.70,0.65,0.55, 0.6,0.1);
    } else if (zone.furniture === 'toolcrib') {
        add(O, cx,0.45,cz, 2.0,0.08,0.7, 0.35,0.35,0.38, 0.4,0.7);
        add(O, cx+2,0.58,cz, 0.50,0.25,0.25, 0.72,0.12,0.10, 0.5,0.6, 3);
        // Pegboard
        add(O, cx,1.5,z1+t/2+0.04, wx*0.6,1.2,0.04, 0.70,0.65,0.55, 0.85,0);
        // Shelving
        add(O, x2-0.6,1.0,cz, 0.5,2.0,wz*0.6, 0.48,0.48,0.50, 0.35,0.8);
        // Air compressor
        add(O, x1+0.6,0.35,z2-0.6, 0.6,0.7,0.4, 0.78,0.20,0.15, 0.5,0.6);
    }
}


// ── CORRIDOR ─────────────────────────────────────
function genCorridor(O, zone, space) {
    const path = zone.path || [[0,-20],[0,20]]; // [[x,z],[x,z],...]
    const w = zone.width || 3.0;
    const h = zone.height || 3.0;
    const t = 0.15;
    const wc = [0.85,0.83,0.80];

    for (let i = 0; i < path.length-1; i++) {
        const a = path[i], b = path[i+1];
        const dx = b[0]-a[0], dz = b[1]-a[1];
        const len = Math.sqrt(dx*dx+dz*dz);
        const cx = (a[0]+b[0])/2, cz = (a[1]+b[1])/2;
        const isNS = Math.abs(dz) >= Math.abs(dx);

        if (isNS) {
            // Walls along X, runs in Z
            add(O, cx-w/2, h/2, cz, t, h, len, wc[0],wc[1],wc[2], 0.7, 0);
            add(O, cx+w/2, h/2, cz, t, h, len, wc[0],wc[1],wc[2], 0.7, 0);
            // Ceiling
            add(O, cx, h, cz, w+t, 0.10, len, wc[0]-0.04,wc[1]-0.03,wc[2]-0.02, 0.65, 0);
            // Floor
            add(O, cx, 0.005, cz, w, 0.01, len, 0.55,0.53,0.50, 0.7, 0);
            // Lights
            for (let lz = -len/2+2; lz < len/2; lz += 4)
                add(O, cx, h-0.08, cz+lz, 0.8,0.03,0.25, 1.0,0.97,0.90, 0.1, 0);
            // Handrails
            add(O, cx-w/2+0.08, 1.0, cz, 0.04,0.04,len, 0.55,0.55,0.58, 0.3,0.7, 1);
            add(O, cx+w/2-0.08, 1.0, cz, 0.04,0.04,len, 0.55,0.55,0.58, 0.3,0.7, 1);
        } else {
            add(O, cx, h/2, cz-w/2, len, h, t, wc[0],wc[1],wc[2], 0.7, 0);
            add(O, cx, h/2, cz+w/2, len, h, t, wc[0],wc[1],wc[2], 0.7, 0);
            add(O, cx, h, cz, len, 0.10, w+t, wc[0]-0.04,wc[1]-0.03,wc[2]-0.02, 0.65, 0);
            add(O, cx, 0.005, cz, len, 0.01, w, 0.55,0.53,0.50, 0.7, 0);
            for (let lx = -len/2+2; lx < len/2; lx += 4)
                add(O, cx+lx, h-0.08, cz, 0.25,0.03,0.8, 1.0,0.97,0.90, 0.1, 0);
            add(O, cx, 1.0, cz-w/2+0.08, len,0.04,0.04, 0.55,0.55,0.58, 0.3,0.7, 1);
            add(O, cx, 1.0, cz+w/2-0.08, len,0.04,0.04, 0.55,0.55,0.58, 0.3,0.7, 1);
        }
    }
}


// ── CONVEYOR ─────────────────────────────────────
function genConveyor(O, agents, eq) {
    const path = eq.path;
    if (!path || path.length < 2) return null;

    // Belt segments
    const beltW = 0.80, beltH = 0.08;
    for (let i = 0; i < path.length-1; i++) {
        const a = path[i], b = path[i+1];
        const cx=(a[0]+b[0])/2, cy=(a[1]+b[1])/2, cz=(a[2]+b[2])/2;
        const dx=b[0]-a[0], dy=b[1]-a[1], dz=b[2]-a[2];
        const segLen = Math.sqrt(dx*dx+dy*dy+dz*dz);
        if (Math.abs(dx) >= Math.abs(dz)) {
            add(O, cx,cy,cz, segLen+0.1,beltH,beltW, 0.50,0.50,0.54, 0.3,0.75);
            add(O, cx,cy+0.06,cz-beltW/2-0.03, segLen+0.1,0.10,0.05, 0.90,0.80,0.08, 0.4,0.6);
            add(O, cx,cy+0.06,cz+beltW/2+0.03, segLen+0.1,0.10,0.05, 0.90,0.80,0.08, 0.4,0.6);
        } else {
            add(O, cx,cy,cz, beltW,beltH,segLen+0.1, 0.50,0.50,0.54, 0.3,0.75);
            add(O, cx-beltW/2-0.03,cy+0.06,cz, 0.05,0.10,segLen+0.1, 0.90,0.80,0.08, 0.4,0.6);
            add(O, cx+beltW/2+0.03,cy+0.06,cz, 0.05,0.10,segLen+0.1, 0.90,0.80,0.08, 0.4,0.6);
        }
    }

    // Compute path for animation
    const lens = []; let total = 0;
    for (let i = 1; i < path.length; i++) {
        const dx=path[i][0]-path[i-1][0], dy=path[i][1]-path[i-1][1], dz=path[i][2]-path[i-1][2];
        const l = Math.sqrt(dx*dx+dy*dy+dz*dz);
        lens.push(l); total += l;
    }

    // Init animated boxes
    const boxes = [];
    const count = eq.boxes || 10;
    const speed = eq.speed || 1.8;
    const colors = [[0.72,0.58,0.40],[0.68,0.55,0.38],[0.65,0.52,0.35],[0.85,0.85,0.82]];
    let bDist = 0;
    for (let i = 0; i < count; i++) {
        bDist += 2.5 + rng()*4.5;
        if (bDist > total) bDist -= total;
        const bc = colors[Math.floor(rng()*colors.length)];
        const bs = 0.35 + rng()*0.30;
        boxes.push({ dist: bDist, speed: speed+rng()*0.4, sx:bs, sy:bs*(0.7+rng()*0.6), sz:bs, r:bc[0],g:bc[1],b:bc[2] });
    }

    return { path, lens, total, boxes };
}


// ── AGENTS ───────────────────────────────────────
function genAgents(people, rackInfo, space) {
    const agents = [];
    const hw = space.width/2, hd = space.depth/2;
    const skins = [[0.70,0.52,0.40],[0.85,0.68,0.55],[0.45,0.30,0.20],[0.60,0.42,0.30],[0.78,0.60,0.48],[0.92,0.78,0.65],[0.55,0.35,0.22]];
    const hairs = [[0.15,0.10,0.06],[0.08,0.06,0.04],[0.55,0.28,0.10],[0.65,0.58,0.35],[0.20,0.15,0.10],[0.35,0.20,0.08],[0.10,0.08,0.06]];

    for (const group of people) {
        for (let i = 0; i < group.count; i++) {
            let px, patrolZ1, patrolZ2;
            if (group.area === 'aisles' && rackInfo) {
                const aisle = i % rackInfo.rows;
                px = rackInfo.rSX + aisle * rackInfo.rSp + rackInfo.rSp/2;
                patrolZ1 = rackInfo.rSZ; patrolZ2 = rackInfo.rEZ;
            } else if (group.area === 'staging') {
                px = -5 + rng()*10; patrolZ1 = hd-18; patrolZ2 = hd-8;
            } else if (group.area === 'loading') {
                px = 12 + i*3; patrolZ1 = hd-8; patrolZ2 = hd-5;
            } else {
                px = rng()*hw*2 - hw; patrolZ1 = -hd+5; patrolZ2 = hd-10;
            }
            const si = Math.floor(rng()*skins.length);
            agents.push({
                px, pz: (patrolZ1+patrolZ2)/2, py: 0, dir: 1,
                patrolZ1, patrolZ2,
                speed: 0.5 + rng()*0.5,
                phase: rng()*Math.PI*2,
                skin: skins[si],
                hair: hairs[Math.floor(rng()*hairs.length)],
                outfit: Math.floor(rng()*5),
                // Personality — drives animation & behavior
                energy: 0.3 + rng()*0.7,
                fidget: 0.1 + rng()*0.5,
                // Behavior state machine
                state: 'walking',   // walking | idle | looking
                stateTimer: rng()*3,
                lookAngle: 0,
                walkPhase: rng()*Math.PI*2,
            });
        }
    }
    return agents;
}


// ── TERRAIN ──────────────────────────────────────
function genTerrain(O, zone, space) {
    const w = zone.width || space?.width || 200;
    const d = zone.depth || space?.depth || 200;
    const hw = w/2, hd = d/2;
    const style = zone.style || 'grass';
    const tileSize = zone.tileSize || 8;
    const hillAmp = zone.elevation === 'rolling' ? 1.5 : zone.elevation === 'hilly' ? 3.0 : 0;

    const colors = {
        grass:  { base: [0.28,0.38,0.18], var: [0.06,0.08,0.04], rough: 0.92 },
        dirt:   { base: [0.40,0.32,0.22], var: [0.06,0.05,0.04], rough: 0.95 },
        gravel: { base: [0.50,0.48,0.44], var: [0.08,0.06,0.05], rough: 0.90 },
        sand:   { base: [0.72,0.65,0.48], var: [0.06,0.04,0.03], rough: 0.88 },
        snow:   { base: [0.88,0.90,0.92], var: [0.04,0.03,0.03], rough: 0.75 },
        asphalt:{ base: [0.22,0.22,0.24], var: [0.03,0.03,0.02], rough: 0.85 },
    };
    const mat = colors[style] || colors.grass;

    for (let tx = -hw; tx < hw; tx += tileSize) {
        for (let tz = -hd; tz < hd; tz += tileSize) {
            const cx = tx + tileSize/2, cz = tz + tileSize/2;
            // Simple sine hill
            let elev = 0;
            if (hillAmp > 0) {
                elev = Math.sin(cx*0.03)*Math.cos(cz*0.04)*hillAmp
                     + Math.sin(cx*0.07+1)*Math.cos(cz*0.05+2)*hillAmp*0.4;
            }
            const cr = mat.base[0] + (rng()-0.5)*mat.var[0]*2;
            const cg = mat.base[1] + (rng()-0.5)*mat.var[1]*2;
            const cb = mat.base[2] + (rng()-0.5)*mat.var[2]*2;
            add(O, cx, elev-0.05, cz, tileSize+0.05, 0.1, tileSize+0.05, cr,cg,cb, mat.rough, 0);
        }
    }
}


// ── STREET ───────────────────────────────────────
function genStreet(O, zone) {
    const w = zone.width || 12;
    const p = zone.path || [[0,0],[0,100]]; // [[x,z], [x,z], ...]
    const lanes = zone.lanes || 2;
    const sidewalk = zone.sidewalk !== false;
    const markings = zone.markings !== false;

    for (let i = 0; i < p.length-1; i++) {
        const a = p[i], b = p[i+1];
        const dx = b[0]-a[0], dz = b[1]-a[1];
        const len = Math.sqrt(dx*dx+dz*dz);
        const cx = (a[0]+b[0])/2, cz = (a[1]+b[1])/2;
        const isNS = Math.abs(dz) >= Math.abs(dx);

        // Road surface
        if (isNS) {
            add(O, cx, 0.01, cz, w, 0.02, len, 0.22,0.22,0.24, 0.85, 0);
        } else {
            add(O, cx, 0.01, cz, len, 0.02, w, 0.22,0.22,0.24, 0.85, 0);
        }

        // Sidewalks
        if (sidewalk) {
            const sw = 2.0, sh = 0.15;
            if (isNS) {
                add(O, cx-w/2-sw/2, sh/2, cz, sw, sh, len, 0.62,0.60,0.56, 0.9, 0);
                add(O, cx+w/2+sw/2, sh/2, cz, sw, sh, len, 0.62,0.60,0.56, 0.9, 0);
                // Curbs
                add(O, cx-w/2, sh/2, cz, 0.15, sh, len, 0.58,0.56,0.52, 0.85, 0);
                add(O, cx+w/2, sh/2, cz, 0.15, sh, len, 0.58,0.56,0.52, 0.85, 0);
            } else {
                add(O, cx, sh/2, cz-w/2-sw/2, len, sh, sw, 0.62,0.60,0.56, 0.9, 0);
                add(O, cx, sh/2, cz+w/2+sw/2, len, sh, sw, 0.62,0.60,0.56, 0.9, 0);
                add(O, cx, sh/2, cz-w/2, len, sh, 0.15, 0.58,0.56,0.52, 0.85, 0);
                add(O, cx, sh/2, cz+w/2, len, sh, 0.15, 0.58,0.56,0.52, 0.85, 0);
            }
        }

        // Lane markings
        if (markings) {
            // Center line (yellow dashed)
            const dashLen = 3, gapLen = 4;
            if (isNS) {
                for (let d = -len/2; d < len/2; d += dashLen+gapLen) {
                    add(O, cx, 0.025, cz+d+dashLen/2, 0.12, 0.005, dashLen, 0.85,0.75,0.10, 0.5, 0);
                }
                // Edge lines (white solid)
                add(O, cx-w/2+0.5, 0.025, cz, 0.10, 0.005, len, 0.90,0.90,0.88, 0.5, 0);
                add(O, cx+w/2-0.5, 0.025, cz, 0.10, 0.005, len, 0.90,0.90,0.88, 0.5, 0);
            } else {
                for (let d = -len/2; d < len/2; d += dashLen+gapLen) {
                    add(O, cx+d+dashLen/2, 0.025, cz, dashLen, 0.005, 0.12, 0.85,0.75,0.10, 0.5, 0);
                }
                add(O, cx, 0.025, cz-w/2+0.5, len, 0.005, 0.10, 0.90,0.90,0.88, 0.5, 0);
                add(O, cx, 0.025, cz+w/2-0.5, len, 0.005, 0.10, 0.90,0.90,0.88, 0.5, 0);
            }
        }
    }
}


// ── BUILDING ─────────────────────────────────────
function genBuilding(O, zone) {
    const pos = zone.position || [0, 0];
    const fp = zone.footprint || [20, 14]; // [width, depth]
    const floors = zone.floors || 3;
    const floorH = zone.floorHeight || 3.2;
    const h = floors * floorH;
    const style = zone.style || 'commercial';
    const bx = pos[0], bz = pos[1];
    const fw = fp[0], fd = fp[1];

    const styles = {
        commercial: { wall: [0.72,0.70,0.66], trim: [0.42,0.44,0.48], winColor: [0.22,0.28,0.35], rough: 0.7, metal: 0.1 },
        industrial: { wall: [0.55,0.55,0.58], trim: [0.40,0.40,0.42], winColor: [0.18,0.22,0.28], rough: 0.5, metal: 0.6 },
        residential:{ wall: [0.78,0.72,0.65], trim: [0.88,0.85,0.80], winColor: [0.25,0.30,0.38], rough: 0.8, metal: 0 },
        brick:      { wall: [0.55,0.28,0.22], trim: [0.60,0.58,0.55], winColor: [0.20,0.25,0.32], rough: 0.85, metal: 0 },
    };
    const s = styles[style] || styles.commercial;

    // Main volume
    add(O, bx, h/2, bz, fw, h, fd, s.wall[0],s.wall[1],s.wall[2], s.rough, s.metal);
    // Shadow
    shadow(O, bx, bz, fw+2, fd+2);

    // Roof parapet
    add(O, bx, h+0.3, bz, fw+0.3, 0.6, fd+0.3, s.trim[0],s.trim[1],s.trim[2], 0.6, 0.3);

    // Windows per floor per side
    const winW = 1.4, winH = 1.6, winD = 0.08;
    for (let f = 0; f < floors; f++) {
        const wy = f*floorH + floorH*0.5 + winH*0.2;
        const nWinsX = Math.max(1, Math.floor((fw-2) / 3));
        const nWinsZ = Math.max(1, Math.floor((fd-2) / 3));

        // Front + back
        for (let wi = 0; wi < nWinsX; wi++) {
            const wx = bx - fw/2 + 1.5 + wi * ((fw-3)/(nWinsX-1||1));
            add(O, wx, wy, bz-fd/2-0.01, winW, winH, winD, s.winColor[0],s.winColor[1],s.winColor[2], 0.08, 0.15);
            add(O, wx, wy, bz+fd/2+0.01, winW, winH, winD, s.winColor[0],s.winColor[1],s.winColor[2], 0.08, 0.15);
        }
        // Sides
        for (let wi = 0; wi < nWinsZ; wi++) {
            const wz = bz - fd/2 + 1.5 + wi * ((fd-3)/(nWinsZ-1||1));
            add(O, bx-fw/2-0.01, wy, wz, winD, winH, winW, s.winColor[0],s.winColor[1],s.winColor[2], 0.08, 0.15);
            add(O, bx+fw/2+0.01, wy, wz, winD, winH, winW, s.winColor[0],s.winColor[1],s.winColor[2], 0.08, 0.15);
        }

        // Floor slab line (trim band between floors)
        add(O, bx, (f+1)*floorH, bz-fd/2-0.02, fw+0.1, 0.12, 0.06, s.trim[0],s.trim[1],s.trim[2], 0.6, 0.2);
        add(O, bx, (f+1)*floorH, bz+fd/2+0.02, fw+0.1, 0.12, 0.06, s.trim[0],s.trim[1],s.trim[2], 0.6, 0.2);
    }

    // Entry door
    add(O, bx, 1.2, bz-fd/2-0.02, 2.0, 2.4, 0.08, 0.15,0.15,0.18, 0.3, 0.5, 3);
    // Entry canopy
    add(O, bx, 2.6, bz-fd/2-0.8, 3.0, 0.08, 1.6, s.trim[0],s.trim[1],s.trim[2], 0.5, 0.4);

    // Rooftop HVAC unit
    add(O, bx+fw*0.25, h+0.9, bz, 2.5, 1.2, 2.0, 0.52,0.52,0.55, 0.5, 0.6, 3);
}


// ── PARKING ──────────────────────────────────────
function genParking(O, zone) {
    const pos = zone.position || [0, 0];
    const w = zone.width || 40;
    const d = zone.depth || 20;
    const rows = zone.rows || 2;
    const fill = zone.fill ?? 0.6;
    const px = pos[0], pz = pos[1];

    // Lot surface
    add(O, px, 0.005, pz, w, 0.01, d, 0.25,0.25,0.27, 0.88, 0);

    // Parking lines + cars
    const spaceW = 2.6, spaceD = 5.0;
    const rowSpacing = spaceD * 2 + 3.5; // aisle between rows
    const nSpaces = Math.floor((w-2) / spaceW);

    for (let row = 0; row < rows; row++) {
        const rz = pz - d/2 + 4 + row * rowSpacing;
        for (let side = 0; side < 2; side++) {
            const sz = rz + (side === 0 ? -spaceD/2 : spaceD/2);
            for (let s = 0; s < nSpaces; s++) {
                const sx = px - w/2 + 1.3 + s * spaceW;
                // Stripe
                add(O, sx-spaceW/2, 0.015, sz, 0.08, 0.005, spaceD, 0.90,0.90,0.88, 0.5, 0);
                // Car
                if (rng() < fill) {
                    genVehicle(O, { type:'car', position:[sx, sz-(side===0?0.5:-0.5)], facing: side===0?'N':'S' });
                }
            }
            // End stripe
            add(O, px+w/2-1.3, 0.015, sz, 0.08, 0.005, spaceD, 0.90,0.90,0.88, 0.5, 0);
        }
    }

    // Light poles
    const poleSpacing = 12;
    for (let lx = px-w/2+6; lx < px+w/2; lx += poleSpacing) {
        add(O, lx, 3.5, pz, 0.12, 7.0, 0.12, 0.50,0.50,0.52, 0.3, 0.7, 1);
        add(O, lx, 7.2, pz, 0.8, 0.15, 0.5, 0.55,0.55,0.58, 0.3, 0.6);
        add(O, lx, 7.05, pz, 0.6, 0.08, 0.35, 1.0,0.97,0.90, 0.1, 0);
    }
}


// ── VEHICLE ──────────────────────────────────────
function genVehicle(O, zone) {
    const pos = zone.position || [0, 0];
    const vx = pos[0], vz = pos[1];
    const type = zone.type || 'car';
    const color = zone.color || [
        [0.65,0.10,0.10],[0.10,0.15,0.55],[0.12,0.12,0.14],[0.85,0.85,0.82],
        [0.20,0.35,0.18],[0.55,0.40,0.15],[0.40,0.40,0.42],[0.15,0.22,0.45]
    ][Math.floor(rng()*8)];
    const facing = zone.facing || 'N';
    const isNS = facing==='N'||facing==='S';

    shadow(O, vx, vz, isNS?1.8:4.2, isNS?4.2:1.8);

    if (type === 'car' || type === 'sedan') {
        const bw=1.8, bl=4.2, bh=1.1, cabH=0.7;
        if (isNS) {
            add(O, vx, bh/2, vz, bw, bh, bl, color[0],color[1],color[2], 0.35, 0.5);
            add(O, vx, bh+cabH/2, vz-0.2, bw-0.15, cabH, bl*0.55, color[0]*0.95,color[1]*0.95,color[2]*0.95, 0.3, 0.5);
            // Windshield
            add(O, vx, bh+cabH*0.4, vz-bl*0.2, bw-0.25, cabH*0.7, 0.06, 0.15,0.20,0.28, 0.06, 0.1);
            // Rear window
            add(O, vx, bh+cabH*0.4, vz+bl*0.12, bw-0.25, cabH*0.6, 0.06, 0.15,0.20,0.28, 0.06, 0.1);
            // Tires
            add(O, vx-bw/2, 0.22, vz-bl*0.28, 0.20, 0.44, 0.44, 0.08,0.08,0.08, 0.7, 0.1, 1);
            add(O, vx+bw/2, 0.22, vz-bl*0.28, 0.20, 0.44, 0.44, 0.08,0.08,0.08, 0.7, 0.1, 1);
            add(O, vx-bw/2, 0.22, vz+bl*0.28, 0.20, 0.44, 0.44, 0.08,0.08,0.08, 0.7, 0.1, 1);
            add(O, vx+bw/2, 0.22, vz+bl*0.28, 0.20, 0.44, 0.44, 0.08,0.08,0.08, 0.7, 0.1, 1);
            // Headlights
            add(O, vx-0.6, 0.6, vz-bl/2-0.01, 0.30, 0.18, 0.04, 0.90,0.88,0.80, 0.1, 0.3);
            add(O, vx+0.6, 0.6, vz-bl/2-0.01, 0.30, 0.18, 0.04, 0.90,0.88,0.80, 0.1, 0.3);
            // Taillights
            add(O, vx-0.6, 0.6, vz+bl/2+0.01, 0.30, 0.15, 0.04, 0.75,0.10,0.08, 0.2, 0.1);
            add(O, vx+0.6, 0.6, vz+bl/2+0.01, 0.30, 0.15, 0.04, 0.75,0.10,0.08, 0.2, 0.1);
        } else {
            add(O, vx, bh/2, vz, bl, bh, bw, color[0],color[1],color[2], 0.35, 0.5);
            add(O, vx-0.2, bh+cabH/2, vz, bl*0.55, cabH, bw-0.15, color[0]*0.95,color[1]*0.95,color[2]*0.95, 0.3, 0.5);
            add(O, vx-bl*0.28, 0.22, vz-bw/2, 0.44, 0.44, 0.20, 0.08,0.08,0.08, 0.7, 0.1, 1);
            add(O, vx-bl*0.28, 0.22, vz+bw/2, 0.44, 0.44, 0.20, 0.08,0.08,0.08, 0.7, 0.1, 1);
            add(O, vx+bl*0.28, 0.22, vz-bw/2, 0.44, 0.44, 0.20, 0.08,0.08,0.08, 0.7, 0.1, 1);
            add(O, vx+bl*0.28, 0.22, vz+bw/2, 0.44, 0.44, 0.20, 0.08,0.08,0.08, 0.7, 0.1, 1);
        }
    } else if (type === 'truck' || type === 'pickup') {
        const bw=2.0, bl=5.4, bh=1.4, cabH=0.8;
        if (isNS) {
            add(O, vx, bh/2, vz, bw, bh, bl, color[0],color[1],color[2], 0.4, 0.5);
            add(O, vx, bh+cabH/2, vz-bl*0.18, bw-0.1, cabH, bl*0.4, color[0],color[1],color[2], 0.35, 0.5);
            add(O, vx, bh/2+0.1, vz+bl*0.2, bw-0.1, bh-0.3, bl*0.35, 0.25,0.25,0.28, 0.6, 0.3);
            // Tires (bigger)
            for (const tz of [-bl*0.3, bl*0.3]) for (const tx of [-bw/2, bw/2]) {
                add(O, vx+tx, 0.26, vz+tz, 0.24, 0.52, 0.52, 0.08,0.08,0.08, 0.7, 0.1, 1);
            }
        } else {
            add(O, vx, bh/2, vz, bl, bh, bw, color[0],color[1],color[2], 0.4, 0.5);
            add(O, vx-bl*0.18, bh+cabH/2, vz, bl*0.4, cabH, bw-0.1, color[0],color[1],color[2], 0.35, 0.5);
        }
    } else if (type === 'bus') {
        const bw=2.5, bl=10, bh=1.6, cabH=1.4;
        if (isNS) {
            add(O, vx, bh/2+cabH/2, vz, bw, bh+cabH, bl, color[0],color[1],color[2], 0.4, 0.4);
            // Window strip
            add(O, vx-bw/2-0.01, bh*0.7+cabH*0.3, vz, 0.04, cabH*0.6, bl-1, 0.18,0.22,0.30, 0.08, 0.15);
            add(O, vx+bw/2+0.01, bh*0.7+cabH*0.3, vz, 0.04, cabH*0.6, bl-1, 0.18,0.22,0.30, 0.08, 0.15);
            for (const tz of [-bl*0.35, bl*0.35]) for (const tx of [-bw/2, bw/2]) {
                add(O, vx+tx, 0.30, vz+tz, 0.28, 0.60, 0.60, 0.08,0.08,0.08, 0.7, 0.1, 1);
            }
        }
    }
}


// ── FENCE ────────────────────────────────────────
function genFence(O, zone) {
    const path = zone.path || [[-20,0],[20,0]]; // [[x,z],[x,z],...]
    const h = zone.height || 2.0;
    const style = zone.style || 'chain'; // 'chain' | 'wood' | 'metal'
    const postSpacing = zone.postSpacing || 3.0;

    const matPost = style==='wood' ? { c:[0.40,0.30,0.18], r:0.85, m:0 }
                  : { c:[0.50,0.50,0.52], r:0.3, m:0.8 };
    const matRail = style==='wood' ? { c:[0.42,0.32,0.20], r:0.85, m:0 }
                  : style==='chain' ? { c:[0.48,0.48,0.50], r:0.4, m:0.7 }
                  : { c:[0.45,0.45,0.48], r:0.35, m:0.75 };

    for (let i = 0; i < path.length-1; i++) {
        const a = path[i], b = path[i+1];
        const dx = b[0]-a[0], dz = b[1]-a[1];
        const len = Math.sqrt(dx*dx+dz*dz);
        const isNS = Math.abs(dz) >= Math.abs(dx);
        const nPosts = Math.max(2, Math.floor(len/postSpacing)+1);

        for (let p = 0; p < nPosts; p++) {
            const t = p / (nPosts-1);
            const ppx = a[0]+dx*t, ppz = a[1]+dz*t;
            const postW = style==='wood' ? 0.12 : 0.08;
            if (style==='wood') {
                add(O, ppx, h/2, ppz, postW, h, postW, matPost.c[0]+rng()*0.06,matPost.c[1]+rng()*0.04,matPost.c[2]+rng()*0.03, matPost.r, matPost.m);
            } else {
                add(O, ppx, h/2, ppz, postW, h, postW, matPost.c[0],matPost.c[1],matPost.c[2], matPost.r, matPost.m, 1);
            }
        }

        // Rails
        const cx = (a[0]+b[0])/2, cz = (a[1]+b[1])/2;
        if (style === 'wood') {
            // 3 horizontal rails
            for (let r = 0; r < 3; r++) {
                const ry = 0.3 + r * (h-0.4)/2;
                if (isNS) add(O, cx, ry, cz, 0.08,0.10,len, matRail.c[0]+rng()*0.04,matRail.c[1]+rng()*0.03,matRail.c[2]+rng()*0.02, matRail.r, matRail.m);
                else add(O, cx, ry, cz, len,0.10,0.08, matRail.c[0]+rng()*0.04,matRail.c[1]+rng()*0.03,matRail.c[2]+rng()*0.02, matRail.r, matRail.m);
            }
        } else if (style === 'chain') {
            // Fill panel (thin box representing mesh)
            if (isNS) add(O, cx, h/2, cz, 0.03, h-0.2, len, matRail.c[0],matRail.c[1],matRail.c[2], matRail.r, matRail.m);
            else add(O, cx, h/2, cz, len, h-0.2, 0.03, matRail.c[0],matRail.c[1],matRail.c[2], matRail.r, matRail.m);
            // Top rail
            if (isNS) add(O, cx, h, cz, 0.05, 0.05, len, matPost.c[0],matPost.c[1],matPost.c[2], matPost.r, matPost.m, 1);
            else add(O, cx, h, cz, len, 0.05, 0.05, matPost.c[0],matPost.c[1],matPost.c[2], matPost.r, matPost.m, 1);
        } else {
            // Metal railing — top rail + mid rail
            for (const ry of [h, h*0.5]) {
                if (isNS) add(O, cx, ry, cz, 0.04,0.04,len, matRail.c[0],matRail.c[1],matRail.c[2], matRail.r, matRail.m, 1);
                else add(O, cx, ry, cz, len,0.04,0.04, matRail.c[0],matRail.c[1],matRail.c[2], matRail.r, matRail.m, 1);
            }
        }
    }
}


// ── FURNITURE LAYOUT ─────────────────────────────
function genFurnitureLayout(O, zone, space) {
    const pos = zone.position || [0, 0];
    const w = zone.width || 20;
    const d = zone.depth || 15;
    const px = pos[0], pz = pos[1];
    const preset = zone.preset || 'open-office';

    if (preset === 'open-office') {
        // Desk pods in rows
        const deskW = 1.4, deskD = 0.7, deskH = 0.75;
        const podCols = Math.floor((w-2) / 3.2);
        const podRows = Math.floor((d-2) / 2.8);
        for (let r = 0; r < podRows; r++) {
            for (let c = 0; c < podCols; c++) {
                const dx = px-w/2 + 1.6 + c*3.2;
                const dz = pz-d/2 + 1.4 + r*2.8;
                // Desk
                add(O, dx, deskH, dz, deskW, 0.04, deskD, 0.70+rng()*0.08,0.65+rng()*0.06,0.55+rng()*0.05, 0.65, 0.1);
                // Legs
                for (const lx of [-deskW/2+0.05, deskW/2-0.05]) for (const lz of [-deskD/2+0.05, deskD/2-0.05])
                    add(O, dx+lx, deskH/2, dz+lz, 0.04, deskH, 0.04, 0.50,0.50,0.52, 0.4, 0.6);
                // Monitor
                add(O, dx, deskH+0.22, dz-0.15, 0.50, 0.35, 0.04, 0.12,0.12,0.14, 0.3, 0.4);
                add(O, dx, deskH+0.04, dz-0.15, 0.12, 0.08, 0.10, 0.50,0.50,0.52, 0.3, 0.7);
                // Chair
                add(O, dx, 0.25, dz+0.5, 0.45, 0.05, 0.45, 0.18+rng()*0.06,0.18+rng()*0.04,0.22+rng()*0.06, 0.7, 0.1);
                add(O, dx, 0.50, dz+0.7, 0.40, 0.45, 0.04, 0.18+rng()*0.06,0.18+rng()*0.04,0.22+rng()*0.06, 0.7, 0.1);
                // Divider between desks (low partition)
                if (c < podCols-1)
                    add(O, dx+1.6, deskH+0.15, dz, 0.03, 0.60, deskD+0.2, 0.65,0.65,0.68, 0.7, 0.1);
            }
        }
    } else if (preset === 'hospital-ward') {
        const nBeds = zone.beds || 6;
        const bedSpacing = Math.min(3.5, (d-2) / nBeds);
        for (let i = 0; i < nBeds; i++) {
            const bz = pz-d/2 + 1.5 + i*bedSpacing;
            // Bed frame
            add(O, px, 0.35, bz, 2.0, 0.06, 0.9, 0.80,0.80,0.82, 0.4, 0.3);
            add(O, px, 0.55, bz, 1.8, 0.08, 0.85, 0.88,0.88,0.90, 0.6, 0.05);
            // Rails
            add(O, px, 0.55, bz-0.42, 1.6, 0.35, 0.03, 0.55,0.55,0.58, 0.3, 0.7, 1);
            add(O, px, 0.55, bz+0.42, 1.6, 0.35, 0.03, 0.55,0.55,0.58, 0.3, 0.7, 1);
            // Headboard
            add(O, px-0.95, 0.60, bz, 0.06, 0.70, 0.88, 0.55,0.55,0.58, 0.35, 0.6);
            // IV pole
            add(O, px+1.2, 1.0, bz-0.3, 0.04, 2.0, 0.04, 0.55,0.55,0.58, 0.25, 0.8, 1);
            add(O, px+1.2, 2.05, bz-0.3, 0.25, 0.04, 0.25, 0.55,0.55,0.58, 0.3, 0.7);
            // Side table
            add(O, px+1.2, 0.38, bz+0.2, 0.45, 0.04, 0.35, 0.72,0.70,0.66, 0.6, 0.1);
            // Curtain rod + curtain
            if (i < nBeds-1)
                add(O, px, 1.8, bz+bedSpacing/2, w*0.7, 0.03, 0.03, 0.55,0.55,0.58, 0.3, 0.7, 1);
        }
    } else if (preset === 'classroom') {
        const dRows = Math.floor((d-3) / 2.2);
        const dCols = Math.floor((w-2) / 2.0);
        for (let r = 0; r < dRows; r++) {
            for (let c = 0; c < dCols; c++) {
                const dx = px-w/2 + 1.0 + c*2.0;
                const dz = pz-d/2 + 2.0 + r*2.2;
                // Student desk
                add(O, dx, 0.72, dz, 0.65, 0.04, 0.50, 0.70,0.65,0.55, 0.7, 0.1);
                add(O, dx, 0.36, dz, 0.04, 0.72, 0.04, 0.50,0.50,0.52, 0.4, 0.6);
                // Chair
                add(O, dx, 0.24, dz+0.4, 0.38, 0.04, 0.38, 0.20,0.22,0.45, 0.6, 0.2);
                add(O, dx, 0.48, dz+0.55, 0.35, 0.40, 0.03, 0.20,0.22,0.45, 0.6, 0.2);
            }
        }
        // Teacher desk
        add(O, px, 0.76, pz-d/2+0.6, 1.6, 0.06, 0.8, 0.50,0.38,0.24, 0.7, 0.1);
        // Whiteboard
        add(O, px, 1.5, pz-d/2+0.05, w*0.6, 1.2, 0.04, 0.92,0.92,0.94, 0.2, 0.1);
    }
}


// ── INTERSECTION (bonus) ─────────────────────────
function genIntersection(O, zone) {
    const pos = zone.position || [0, 0];
    const size = zone.size || 16;
    const ix = pos[0], iz = pos[1];

    // Intersection pad
    add(O, ix, 0.01, iz, size, 0.02, size, 0.22,0.22,0.24, 0.85, 0);

    // Crosswalks (white stripes)
    for (let side = 0; side < 4; side++) {
        for (let s = -2; s <= 2; s++) {
            const sw = 0.5, sl = 3.0;
            if (side === 0) add(O, ix+s*1.0, 0.025, iz-size/2+1.5, sw, 0.005, sl, 0.90,0.90,0.88, 0.5, 0);
            else if (side === 1) add(O, ix+s*1.0, 0.025, iz+size/2-1.5, sw, 0.005, sl, 0.90,0.90,0.88, 0.5, 0);
            else if (side === 2) add(O, ix-size/2+1.5, 0.025, iz+s*1.0, sl, 0.005, sw, 0.90,0.90,0.88, 0.5, 0);
            else add(O, ix+size/2-1.5, 0.025, iz+s*1.0, sl, 0.005, sw, 0.90,0.90,0.88, 0.5, 0);
        }
    }

    // Stop lines
    add(O, ix, 0.025, iz-size/2+0.2, size*0.35, 0.005, 0.25, 0.90,0.90,0.88, 0.5, 0);
    add(O, ix, 0.025, iz+size/2-0.2, size*0.35, 0.005, 0.25, 0.90,0.90,0.88, 0.5, 0);

    // Traffic signal poles
    if (zone.signals !== false) {
        for (const corner of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
            const cx = ix + corner[0]*(size/2-0.5), cz = iz + corner[1]*(size/2-0.5);
            add(O, cx, 2.5, cz, 0.10, 5.0, 0.10, 0.30,0.30,0.32, 0.4, 0.7, 1);
            add(O, cx-corner[0]*0.4, 4.6, cz, 0.30, 0.80, 0.30, 0.18,0.18,0.20, 0.5, 0.5, 3);
            // Signal lights
            add(O, cx-corner[0]*0.4, 5.0, cz-corner[1]*0.01, 0.12, 0.12, 0.08, 0.85,0.10,0.08, 0.2, 0.1);
            add(O, cx-corner[0]*0.4, 4.65, cz-corner[1]*0.01, 0.12, 0.12, 0.08, 0.85,0.75,0.10, 0.2, 0.1);
            add(O, cx-corner[0]*0.4, 4.30, cz-corner[1]*0.01, 0.12, 0.12, 0.08, 0.10,0.65,0.12, 0.2, 0.1);
        }
    }
}


// ── TREES ────────────────────────────────────────
function genTrees(O, zone) {
    const region = zone.region || { x:[-50,50], z:[-50,50] };
    const count = zone.count || 12;
    const species = zone.species || 'mixed'; // 'oak','pine','palm','mixed'
    const clearCenter = zone.clearRadius || 0; // keep center open

    const treeTypes = {
        oak: { trunk:[0.10,0.22,0.08], canopy:[0.18,0.35,0.14], hVar:0.06, trunkH:[2.0,3.5], canopyR:[2.5,4.5], canopyH:0.8, mesh:2 },
        pine: { trunk:[0.15,0.12,0.08], canopy:[0.08,0.28,0.10], hVar:0.04, trunkH:[3.0,5.0], canopyR:[1.5,2.5], canopyH:1.5, mesh:2 },
        palm: { trunk:[0.22,0.18,0.12], canopy:[0.12,0.38,0.08], hVar:0.03, trunkH:[4.0,7.0], canopyR:[2.0,3.5], canopyH:0.5, mesh:2 },
        birch: { trunk:[0.75,0.72,0.68], canopy:[0.25,0.42,0.15], hVar:0.08, trunkH:[2.5,4.0], canopyR:[2.0,3.5], canopyH:0.9, mesh:2 },
    };
    const available = species === 'mixed' ? ['oak','pine','birch'] : [species];

    for (let i = 0; i < count; i++) {
        const tx = region.x[0] + rng() * (region.x[1]-region.x[0]);
        const tz = region.z[0] + rng() * (region.z[1]-region.z[0]);
        if (clearCenter > 0 && Math.abs(tx) < clearCenter && Math.abs(tz) < clearCenter) continue;
        const spec = treeTypes[available[Math.floor(rng()*available.length)]];
        const th = spec.trunkH[0] + rng()*(spec.trunkH[1]-spec.trunkH[0]);
        const cr = spec.canopyR[0] + rng()*(spec.canopyR[1]-spec.canopyR[0]);
        const tw = 0.15 + rng()*0.25;
        // Trunk
        add(O, tx, th/2, tz, tw, th, tw, spec.trunk[0]+rng()*0.04, spec.trunk[1]+rng()*0.03, spec.trunk[2]+rng()*0.02, 0.9, 0, 1);
        // Canopy
        add(O, tx, th+cr*0.3, tz, cr, cr*spec.canopyH, cr, spec.canopy[0]+rng()*spec.hVar, spec.canopy[1]+rng()*spec.hVar, spec.canopy[2]+rng()*spec.hVar*0.5, 0.92, 0, spec.mesh);
        // Shadow
        shadow(O, tx, tz, cr*1.4, cr*1.4);
    }
}


// ── PARK ─────────────────────────────────────────
function genPark(O, zone) {
    const pos = zone.position || [0, 0];
    const w = zone.width || 30;
    const d = zone.depth || 30;
    const px = pos[0], pz = pos[1];

    // Grass surface
    add(O, px, 0.02, pz, w, 0.04, d, 0.22,0.36,0.14, 0.92, 0);

    // Walking path (loop around edge)
    const pw = 1.8, pt = 0.03;
    add(O, px, 0.04, pz-d/2+2, w-6, pt, pw, 0.52,0.48,0.42, 0.88, 0); // south path
    add(O, px, 0.04, pz+d/2-2, w-6, pt, pw, 0.52,0.48,0.42, 0.88, 0); // north path
    add(O, px-w/2+2, 0.04, pz, pw, pt, d-6, 0.52,0.48,0.42, 0.88, 0); // west path
    add(O, px+w/2-2, 0.04, pz, pw, pt, d-6, 0.52,0.48,0.42, 0.88, 0); // east path
    // Diagonal cross path
    add(O, px, 0.04, pz, w*0.6, pt, pw, 0.52,0.48,0.42, 0.88, 0);

    // Benches along paths
    for (let i = 0; i < 4; i++) {
        const bx = px-w/3 + i*(w*2/3/3);
        const bz = pz-d/2+2.8;
        add(O, bx, 0.28, bz, 1.2, 0.04, 0.40, 0.42,0.32,0.18, 0.8, 0);
        add(O, bx, 0.46, bz+0.18, 1.2, 0.32, 0.04, 0.42,0.32,0.18, 0.8, 0);
        add(O, bx-0.55, 0.22, bz, 0.04, 0.44, 0.35, 0.28,0.28,0.30, 0.4, 0.7);
        add(O, bx+0.55, 0.22, bz, 0.04, 0.44, 0.35, 0.28,0.28,0.30, 0.4, 0.7);
    }

    // Fountain in center
    if (zone.fountain !== false) {
        add(O, px, 0.35, pz, 2.5, 0.70, 2.5, 0.60,0.58,0.55, 0.5, 0.3, 1); // basin
        add(O, px, 0.06, pz, 3.0, 0.12, 3.0, 0.58,0.56,0.52, 0.6, 0.2); // base
        add(O, px, 0.90, pz, 0.20, 1.10, 0.20, 0.62,0.60,0.56, 0.4, 0.3, 1); // pedestal
        add(O, px, 1.55, pz, 0.50, 0.15, 0.50, 0.65,0.62,0.58, 0.35, 0.3); // top bowl
        // Water surface (shiny blue)
        add(O, px, 0.62, pz, 2.2, 0.02, 2.2, 0.15,0.30,0.50, 0.08, 0.2, 1);
    }

    // Lamp posts
    for (const lp of [[-w/3,-d/3],[w/3,-d/3],[-w/3,d/3],[w/3,d/3]]) {
        add(O, px+lp[0], 2.0, pz+lp[1], 0.08, 4.0, 0.08, 0.25,0.25,0.28, 0.35, 0.7, 1);
        add(O, px+lp[0], 4.2, pz+lp[1], 0.45, 0.15, 0.30, 0.35,0.35,0.38, 0.3, 0.6);
        add(O, px+lp[0], 4.05, pz+lp[1], 0.35, 0.06, 0.22, 1.0,0.97,0.90, 0.1, 0);
    }

    // Trees around perimeter
    genTrees(O, { region:{ x:[px-w/2+2,px+w/2-2], z:[pz-d/2+2,pz+d/2-2] }, count: zone.trees || 8, species: zone.species || 'mixed', clearRadius: Math.min(w,d)*0.25 });

    // Trash cans
    add(O, px-w/3, 0.35, pz-d/2+3.5, 0.30, 0.70, 0.30, 0.18,0.32,0.18, 0.6, 0.2, 1);
    add(O, px+w/3, 0.35, pz+d/2-3.5, 0.30, 0.70, 0.30, 0.18,0.32,0.18, 0.6, 0.2, 1);
}


// ── WATER BODY ───────────────────────────────────
const WATER_PRESETS = {
    ocean:    { deep:[0.02,0.12,0.22], shallow:[0.10,0.40,0.50], waveScale:1.0, waveSpeed:1.0, amplitude:0.15, foam:0.5, specPower:120 },
    tropical: { deep:[0.01,0.18,0.28], shallow:[0.15,0.60,0.55], waveScale:0.8, waveSpeed:0.8, amplitude:0.10, foam:0.3, specPower:140 },
    murky:    { deep:[0.08,0.10,0.06], shallow:[0.20,0.22,0.14], waveScale:0.6, waveSpeed:0.5, amplitude:0.08, foam:0.2, specPower:80 },
    arctic:   { deep:[0.08,0.15,0.25], shallow:[0.55,0.70,0.78], waveScale:0.5, waveSpeed:0.4, amplitude:0.06, foam:0.6, specPower:160 },
    pond:     { deep:[0.04,0.12,0.16], shallow:[0.12,0.32,0.28], waveScale:0.3, waveSpeed:0.3, amplitude:0.03, foam:0.05, specPower:100 },
    river:    { deep:[0.05,0.14,0.18], shallow:[0.14,0.35,0.30], waveScale:0.7, waveSpeed:1.2, amplitude:0.08, foam:0.4, specPower:90 },
};

function genWaterBody(O, zone, waterBodies) {
    const pos = zone.position || [0, 0];
    const w = zone.width || 20;
    const d = zone.depth || 15;
    const px = pos[0], pz = pos[1];
    const y = zone.y ?? -0.05;
    const presetName = zone.preset || 'pond';
    const preset = WATER_PRESETS[presetName] || WATER_PRESETS.pond;

    // Register water body for the screen-space water pass
    if (waterBodies) {
        waterBodies.push({
            y, bounds: [px-w/2, pz-d/2, px+w/2, pz+d/2],
            deep: zone.deep || preset.deep,
            shallow: zone.shallow || preset.shallow,
            waveScale: zone.waveScale ?? preset.waveScale,
            waveSpeed: zone.waveSpeed ?? preset.waveSpeed,
            amplitude: zone.amplitude ?? preset.amplitude,
            foam: zone.foam ?? preset.foam,
            specPower: zone.specPower ?? preset.specPower,
        });
    }

    // Dark bottom
    add(O, px, y-0.15, pz, w-1, 0.02, d-1, 0.06,0.10,0.14, 0.95, 0);
    // Shore edge — dirt/gravel ring
    add(O, px, 0.01, pz, w+2, 0.03, d+2, 0.38,0.32,0.22, 0.90, 0);

    // Rocks along edge
    for (let i = 0; i < 12; i++) {
        const angle = rng() * Math.PI * 2;
        const rx = px + Math.cos(angle)*(w/2+0.5+rng()*0.5);
        const rz = pz + Math.sin(angle)*(d/2+0.5+rng()*0.5);
        const rs = 0.2+rng()*0.4;
        add(O, rx, rs*0.3, rz, rs, rs*0.6, rs, 0.45+rng()*0.08,0.43+rng()*0.06,0.40+rng()*0.05, 0.85, 0.1, 2);
    }
}


// ── RESIDENTIAL — houses along a street ──────────
function genResidential(O, zone) {
    const count = zone.count || 4;
    const side = zone.side || 'east'; // which side of a NS street
    const startZ = zone.startZ || -40;
    const spacing = zone.spacing || 14;
    const streetX = zone.streetX || 0;
    const setback = 12; // distance from street center
    const sign = side === 'east' ? 1 : -1;

    const houseColors = [
        [0.75,0.72,0.65],[0.62,0.58,0.52],[0.78,0.68,0.58],[0.55,0.48,0.42],
        [0.70,0.65,0.60],[0.82,0.78,0.72],[0.58,0.52,0.48],[0.72,0.62,0.55]
    ];
    const roofColors = [
        [0.25,0.22,0.20],[0.35,0.18,0.15],[0.30,0.28,0.25],[0.22,0.25,0.28]
    ];

    for (let i = 0; i < count; i++) {
        const hx = streetX + sign * setback;
        const hz = startZ + i * spacing;
        const hw = 8 + rng()*4;
        const hd = 7 + rng()*3;
        const hh = 3.0 + rng()*0.5;
        const wc = houseColors[Math.floor(rng()*houseColors.length)];
        const rc = roofColors[Math.floor(rng()*roofColors.length)];

        // House body
        add(O, hx, hh/2, hz, hw, hh, hd, wc[0],wc[1],wc[2], 0.75, 0);
        shadow(O, hx, hz, hw+2, hd+2);

        // Roof (flat pitched — just a thinner box on top)
        add(O, hx, hh+0.4, hz, hw+0.6, 0.8, hd+0.6, rc[0],rc[1],rc[2], 0.8, 0.1);

        // Front door
        add(O, hx-sign*hw/2-sign*0.02, 1.1, hz, 0.06, 2.2, 0.9, 0.30,0.22,0.15, 0.6, 0.1, 3);

        // Windows
        for (let wi = 0; wi < 3; wi++) {
            const wz = hz - hd*0.3 + wi*(hd*0.3);
            add(O, hx-sign*hw/2-sign*0.02, hh*0.55, wz, 0.06, 1.0, 0.8, 0.20,0.25,0.35, 0.08, 0.15);
        }
        // Side windows
        add(O, hx, hh*0.55, hz-hd/2-0.02, 1.2, 1.0, 0.06, 0.20,0.25,0.35, 0.08, 0.15);
        add(O, hx, hh*0.55, hz+hd/2+0.02, 1.2, 1.0, 0.06, 0.20,0.25,0.35, 0.08, 0.15);

        // Driveway
        add(O, hx-sign*(hw/2+2.5), 0.015, hz-1.5, 5, 0.02, 3, 0.42,0.42,0.44, 0.85, 0);

        // Mailbox
        add(O, hx-sign*(hw/2+5), 0.55, hz-2, 0.20, 1.1, 0.20, 0.15,0.15,0.18, 0.5, 0.6, 1);
        add(O, hx-sign*(hw/2+5), 1.0, hz-2, 0.35, 0.25, 0.25, 0.15,0.25,0.50, 0.5, 0.4, 3);
    }
}


// ── RETAIL STRIP ─────────────────────────────────
function genRetailStrip(O, zone) {
    const pos = zone.position || [0, 0];
    const stores = zone.stores || 5;
    const storeW = zone.storeWidth || 8;
    const totalW = stores * storeW;
    const d = 12, h = 4.5;
    const px = pos[0], pz = pos[1];

    // Shared roof / fascia
    add(O, px, h+0.3, pz, totalW+2, 0.5, d+1, 0.55,0.52,0.48, 0.7, 0.2);

    // Parking in front
    add(O, px, 0.01, pz-d/2-8, totalW, 0.02, 12, 0.25,0.25,0.27, 0.85, 0);

    const storeColors = [
        [0.82,0.78,0.72],[0.70,0.65,0.58],[0.75,0.72,0.68],[0.68,0.62,0.55],
        [0.80,0.75,0.70],[0.72,0.68,0.62]
    ];

    for (let i = 0; i < stores; i++) {
        const sx = px - totalW/2 + storeW/2 + i*storeW;
        const sc = storeColors[Math.floor(rng()*storeColors.length)];
        // Store body
        add(O, sx, h/2, pz, storeW-0.3, h, d, sc[0],sc[1],sc[2], 0.7, 0);
        // Storefront glass
        add(O, sx, h*0.4, pz-d/2-0.02, storeW*0.7, h*0.6, 0.06, 0.18,0.24,0.32, 0.06, 0.15);
        // Door
        add(O, sx, 1.1, pz-d/2-0.03, 1.0, 2.2, 0.06, 0.15,0.20,0.28, 0.08, 0.15, 3);
        // Sign above
        const signColors = [[0.80,0.20,0.15],[0.15,0.35,0.65],[0.20,0.55,0.25],[0.75,0.55,0.10]];
        const sgc = signColors[Math.floor(rng()*signColors.length)];
        add(O, sx, h-0.3, pz-d/2-0.04, storeW*0.6, 0.6, 0.06, sgc[0],sgc[1],sgc[2], 0.4, 0.1);
        // Awning
        add(O, sx, h*0.62, pz-d/2-1.0, storeW*0.7, 0.06, 2.0, sgc[0]*0.8,sgc[1]*0.8,sgc[2]*0.8, 0.6, 0.1);
    }

    // Parking stripes
    for (let i = 0; i <= Math.floor(totalW/2.6); i++) {
        const lx = px-totalW/2+1.3+i*2.6;
        add(O, lx, 0.02, pz-d/2-8, 0.08, 0.005, 5, 0.90,0.90,0.88, 0.5, 0);
    }

// ── LAMP POSTS ───────────────────────────────────
function genLampPosts(O, zone) {
    const path = zone.path || [[0,-50],[0,50]];
    const spacing = zone.spacing || 15;
    const side = zone.side || 'both'; // 'left','right','both'
    const h = zone.height || 6;
    const offset = zone.offset || 8; // distance from path center

    for (let i = 0; i < path.length-1; i++) {
        const a = path[i], b = path[i+1];
        const dx = b[0]-a[0], dz = b[1]-a[1];
        const len = Math.sqrt(dx*dx+dz*dz);
        const nx = -dz/len, nz = dx/len; // perpendicular
        const steps = Math.floor(len/spacing);
        for (let s = 0; s <= steps; s++) {
            const t = s / Math.max(steps,1);
            const lx = a[0]+dx*t, lz = a[1]+dz*t;
            const sides = side==='both' ? [-1,1] : side==='left' ? [-1] : [1];
            for (const dir of sides) {
                const px = lx + nx*offset*dir, pz2 = lz + nz*offset*dir;
                add(O, px, h/2, pz2, 0.10, h, 0.10, 0.30,0.30,0.32, 0.4, 0.7, 1);
                add(O, px, h+0.15, pz2, 0.6, 0.12, 0.35, 0.35,0.35,0.38, 0.35, 0.6);
                add(O, px, h+0.02, pz2, 0.45, 0.06, 0.25, 1.0,0.97,0.90, 0.1, 0);
            }
        }
    }
}


// ── SIGNAGE ──────────────────────────────────────
function genSignage(O, zone) {
    const signs = zone.signs || [];
    for (const s of signs) {

            add(O, sx, 3.3, sz, 0.55, 0.55, 0.06, 0.82,0.12,0.10, 0.4, 0.1, 3);

            add(O, sx, 3.3, sz, 0.55, 0.55, 0.06, 0.90,0.80,0.08, 0.4, 0.1);

// ── CLOUDS ──────────────────────────────────────
function genClouds(O, zone, space) {
    const w = zone.width || space?.width || 200;
    const d = zone.depth || space?.depth || 200;
    const hw = w/2, hd = d/2;
    const count = zone.count || 20;
    const minY = zone.minHeight || 35;
    const maxY = zone.maxHeight || 65;
    const mood = zone.mood || 'outdoor';

    // Mood-based brightness
    const bright = mood === 'moody' ? 0.65 + rng()*0.10 : 0.88 + rng()*0.10;

    for (let g = 0; g < count; g++) {
        const cx = -hw + rng() * w;
        const cz = -hd + rng() * d;
        const cy = minY + rng() * (maxY - minY);
        const gp = rng() * Math.PI * 2;
        const bW = 10 + rng() * 14, bH = 2 + rng() * 2.5, bD = 7 + rng() * 10;
        const br = bright * (0.95 + rng() * 0.05);
        // Core sphere
        O.push({ x:cx, y:cy, z:cz, sx:bW*0.9, sy:bH*0.9, sz:bD*0.9, r:br, g:br, b:br*0.97, rough:0.95, metal:0, mesh:2, cloudPhase:gp });
        // 2-3 bump spheres
        const nB = 2 + Math.floor(rng() * 2);
        for (let p = 0; p < nB; p++) {
            const ox = (rng()-0.5) * bW * 0.35;
            const oy = (rng()-0.3) * bH * 0.25;
            const oz = (rng()-0.5) * bD * 0.3;
            O.push({ x:cx+ox, y:cy+oy, z:cz+oz, sx:bW*(0.6+rng()*0.25), sy:bH*(0.6+rng()*0.3), sz:bD*(0.55+rng()*0.25),
                r:br, g:br, b:br*0.97, rough:0.95, metal:0, mesh:2, cloudPhase:gp+rng()*0.3 });
        }
    }
}


// ── ROCKS / BOULDERS ────────────────────────────
function genRocks(O, zone) {
    const region = zone.region || { x:[-60,60], z:[-60,60] };
    const count = zone.count || 20;
    const clearRadius = zone.clearRadius || 12;

    for (let i = 0; i < count; i++) {
        const rx = region.x[0] + rng() * (region.x[1] - region.x[0]);
        const rz = region.z[0] + rng() * (region.z[1] - region.z[0]);
        if (Math.abs(rx) < clearRadius && Math.abs(rz) < clearRadius) continue;
        const rs = 0.3 + rng() * 1.2;
        add(O, rx, rs*0.3, rz, rs, rs*0.6, rs*(0.7+rng()*0.3),
            0.42+rng()*0.10, 0.40+rng()*0.08, 0.38+rng()*0.06, 0.85, 0.1, 2);
    }
}


// ── UTILITY POLES ───────────────────────────────
function genUtilityPoles(O, zone) {
    const path = zone.path || [[0,-60],[0,60]];
    const spacing = zone.spacing || 25;
    const side = zone.side || 'right';
    const offset = zone.offset || 9;
    const h = zone.height || 9;

    for (let i = 0; i < path.length-1; i++) {
        const a = path[i], b = path[i+1];
        const dx = b[0]-a[0], dz = b[1]-a[1];
        const len = Math.sqrt(dx*dx+dz*dz);
        const nx = -dz/len, nz = dx/len;
        const steps = Math.floor(len/spacing);
        for (let s = 0; s <= steps; s++) {
            const t = s / Math.max(steps,1);
            const px = a[0]+dx*t, pz = a[1]+dz*t;
            const sign = side === 'both' ? [-1,1] : side === 'left' ? [-1] : [1];
            for (const dir of sign) {
                const ux = px + nx*offset*dir, uz = pz + nz*offset*dir;
                // Pole
                add(O, ux, h/2, uz, 0.15, h, 0.15, 0.35,0.30,0.22, 0.85, 0, 1);
                // Crossbar
                add(O, ux, h-0.3, uz, 2.5, 0.12, 0.12, 0.32,0.28,0.20, 0.85, 0);
                // Insulators
                for (const ix of [-1,0,1]) {
                    add(O, ux+ix*0.9, h-0.1, uz, 0.08, 0.18, 0.08, 0.45,0.50,0.52, 0.4, 0.3, 1);
                }
            }
        }
    }
}

    const atm = json.atmosphere || {};
