// NATURAL LANGUAGE PARSER — text → JSON
// Pattern matching on the declarative vocabulary
// ══════════════════════════════════════════════════
function parseDescription(text) {
    const t = text.toLowerCase();
    const json = { meta: {}, space: {}, zones: [], equipment: [], people: [], atmosphere: {}, camera: {} };

    // ── Extract numbers near keywords ──
    function numNear(keyword, def) {
        const re = new RegExp('(\\d+)\\s*' + keyword + '|' + keyword + '\\s*(\\d+)', 'i');
        const m = t.match(re);
        return m ? parseInt(m[1] || m[2]) : def;
    }
    function hasWord(...words) { return words.some(w => t.includes(w)); }

    // ── META: type detection ──
    let metaType = 'warehouse';
    if (hasWord('hospital','clinic','medical','ward')) metaType = 'warehouse'; // interior
    else if (hasWord('city','block','street','downtown','outdoor','park','town')) metaType = 'exterior';
    else if (hasWord('office','corporate')) metaType = 'warehouse';
    else if (hasWord('factory','plant','manufacturing')) metaType = 'warehouse';
    json.meta.type = metaType;

    // ── NAME ──
    if (hasWord('warehouse')) json.meta.name = 'Warehouse';
    else if (hasWord('hospital','medical')) json.meta.name = 'Medical Center';
    else if (hasWord('factory','plant')) json.meta.name = 'Factory';
    else if (hasWord('office')) json.meta.name = 'Office Building';
    else if (hasWord('hangar')) json.meta.name = 'Hangar';
    else if (hasWord('school','classroom')) json.meta.name = 'School';
    else if (hasWord('city','downtown','block')) json.meta.name = 'City Block';
    else if (hasWord('abandoned','condemned')) json.meta.name = 'Abandoned Site';
    else json.meta.name = 'Environment';

    // ── SIZE ──
    let sizeScale = 1.0;
    if (hasWord('tiny','very small')) sizeScale = 0.5;
    else if (hasWord('small','compact')) sizeScale = 0.7;
    else if (hasWord('medium')) sizeScale = 1.0;
    else if (hasWord('large','big')) sizeScale = 1.4;
    else if (hasWord('huge','massive','very large','enormous')) sizeScale = 1.8;

    if (metaType === 'exterior') {
        json.space = { width: Math.round(120*sizeScale), depth: Math.round(120*sizeScale), height: 40 };
    } else {
        const baseW = hasWord('hospital','office') ? 36 : hasWord('factory','hangar') ? 50 : 44;
        const baseD = hasWord('hospital','office') ? 42 : hasWord('factory','hangar') ? 60 : 50;
        const baseH = hasWord('hospital','office') ? 3.5 : hasWord('factory','hangar') ? 9 : 8;
        json.space = {
            width: Math.round(baseW * sizeScale),
            depth: Math.round(baseD * sizeScale),
            height: Math.round(baseH * (sizeScale > 1.2 ? 1.1 : 1) * 10) / 10,
        };
        json.space.columns = { spacing: [Math.round(json.space.width/4), Math.round(json.space.depth/4)], inset: 8, material: hasWord('concrete column') ? 'concrete' : 'steel' };
    }

    // ── AGE ──
    if (hasWord('new','pristine','brand new','fresh')) json.space.age = 1;
    else if (hasWord('old','aged','worn')) json.space.age = 20;
    else if (hasWord('ancient','abandoned','condemned','decrepit','very old')) json.space.age = 35;
    else json.space.age = 8;

    // ── ATMOSPHERE ──
    if (hasWord('moody','dark','noir','dramatic','dim','creepy')) json.atmosphere.mood = 'moody';
    else if (hasWord('military','harsh','tactical','stern')) json.atmosphere.mood = 'military';
    else if (hasWord('clean','bright','sterile','clinical','white')) json.atmosphere.mood = 'clean';
    else if (hasWord('outdoor','outside','daylight','sunny')) json.atmosphere.mood = 'outdoor';
    else json.atmosphere.mood = 'industrial';

    // ── AUDIO ──
    if (hasWord('hospital','medical','clinic')) json.audio = { preset: 'hospital' };
    else if (hasWord('office')) json.audio = { preset: 'office' };
    else if (hasWord('factory','plant')) json.audio = { preset: 'factory' };
    else if (hasWord('quiet','silent','abandoned')) json.audio = { preset: 'quiet' };
    else if (metaType === 'exterior') json.audio = { preset: 'outdoor' };
    else json.audio = { preset: 'warehouse' };

    // ── ZONES ──
    // Racking
    const rackRows = numNear('row', 0);
    if (rackRows > 0 || (hasWord('racking','rack','shelving','shelves') && !hasWord('no rack','without rack'))) {
        const rows = rackRows || (sizeScale < 0.8 ? 2 : sizeScale < 1.2 ? 3 : 5);
        const levels = numNear('level', numNear('tier', 4));
        let fill = 0.75;
        if (hasWord('empty','mostly empty','sparse')) fill = 0.2;
        else if (hasWord('half full','half empty','partial')) fill = 0.5;
        else if (hasWord('full','packed','loaded')) fill = 0.95;
        json.zones.push({ type: 'racking', rows, levels, fill, aisleWidth: 3.8 });
    }

    // Dock doors
    const dockCount = numNear('dock', numNear('door', 0));
    if (dockCount > 0 || hasWord('dock','loading dock','bay')) {
        json.zones.push({ type: 'dock', count: dockCount || 3, wall: 'south' });
    }

    // Rooms
    if (hasWord('office','front office')) {
        const hw = json.space.width/2, hd = json.space.depth/2;
        json.zones.push({ type:'room', name:'Office', bounds:[-hw,-hd,-hw+9,-hd+7], height:3, door:{wall:'east',position:-hd+3}, furniture:'office' });
    }
    if (hasWord('break room','breakroom','break area','lunch')) {
        const hw = json.space.width/2, hd = json.space.depth/2;
        json.zones.push({ type:'room', name:'Break Room', bounds:[-hw,-hd+7,-hw+8,-hd+13], height:3, door:{wall:'east',position:-hd+10}, furniture:'breakroom' });
    }
    if (hasWord('tool room','tool crib','workshop','tool shop')) {
        const hw = json.space.width/2, hd = json.space.depth/2;
        json.zones.push({ type:'room', name:'Tool Room', bounds:[-hw,hd-8,-hw+7,hd], height:3, door:{wall:'east',position:hd-4}, furniture:'toolcrib' });
    }

    // Staging
    if (hasWord('staging','stage area','pallet area') || hasWord('warehouse','factory')) {
        json.zones.push({ type: 'staging', rows: 1, fill: 0.7 });
    }

    // Safety (always for interiors)
    if (metaType !== 'exterior') {
        json.zones.push({ type: 'safety' });
    }

    // Overhead
    if (metaType !== 'exterior' && !hasWord('office','hospital','school')) {
        json.zones.push({ type: 'overhead', fireSuppression: true });
    }

    // ── HOSPITAL / MEDICAL ──
    if (hasWord('hospital','medical','clinic','ward')) {
        json.space.floor = 'polished';
        const beds = numNear('bed', 6);
        const wards = numNear('ward', hasWord('2 ward','two ward') ? 2 : 1);
        const hw = json.space.width/2;
        for (let i = 0; i < wards; i++) {
            const wx = i === 0 ? -hw+1 : 2;
            json.zones.push({ type: 'furniture', preset: 'hospital-ward', position: [wx+6, -10], width: 12, depth: 14, beds });
        }
        if (hasWord('nurse','nurses station','station')) {
            json.zones.push({ type: 'room', name: 'Nurses Station', bounds: [-4,-8,4,-2], height: 3.2, door:{wall:'south',position:0}, furniture: 'office' });
        }
    }

    // ── SCHOOL / CLASSROOM ──
    if (hasWord('school','classroom')) {
        const nClass = numNear('classroom', numNear('room', 2));
        for (let i = 0; i < nClass; i++) {
            const cz = -json.space.depth/2 + 4 + i * 18;
            json.zones.push({ type: 'furniture', preset: 'classroom', position: [0, cz+7], width: json.space.width-4, depth: 14 });
        }
    }

    // ── OFFICE BUILDING (exterior) ──
    if (hasWord('office building') && metaType === 'exterior') {
        json.zones.push({ type: 'building', position: [0, 0], footprint: [22, 16], floors: numNear('floor', numNear('story', numNear('storey', 3))), style: 'commercial' });
    }

    // ── EXTERIOR: streets, buildings, parking, parks, etc. ──
    if (metaType === 'exterior') {
        const hw = json.space.width/2, hd = json.space.depth/2;
        json.zones.push({ type: 'terrain', style: hasWord('snow','winter')?'snow':hasWord('desert','sand')?'sand':hasWord('dirt')?'dirt':'grass', tileSize: 10 });

        // Streets
        if (hasWord('street','road','intersection','downtown','neighborhood','suburb')) {
            json.zones.push({ type: 'street', width: 12, path: [[0,-hd],[0,hd]] });
            json.zones.push({ type: 'street', width: 10, path: [[-hw,0],[hw,0]] });
            json.zones.push({ type: 'lamp-posts', path: [[0,-hd],[0,hd]], spacing: 18, offset: 9 });
        }
        if (hasWord('intersection','downtown')) {
            json.zones.push({ type: 'intersection', position: [0, 0], signals: true });
            json.zones.push({ type: 'signage', signs: [
                { type:'stop', position:[-9,-9] }, { type:'stop', position:[9,9] },
                { type:'street', position:[-8,8] }, { type:'speed', position:[10,-12] }
            ]});
        }

        // Buildings
        const nBuildings = numNear('building', 0);
        if (nBuildings > 0 || hasWord('building','buildings','downtown')) {
            const nb = nBuildings || 4;
            const styles = ['commercial','brick','residential','industrial'];
            const positions = [[-28,-28],[28,-28],[-28,28],[28,28],[-28,0],[28,0]];
            for (let i = 0; i < Math.min(nb, 6); i++) {
                const p = positions[i];
                const floors = 2 + Math.floor(rng()*4);
                json.zones.push({ type: 'building', position: p, footprint: [16+rng()*10, 12+rng()*8], floors, style: styles[i%styles.length] });
            }
        }

        // Houses / residential
        if (hasWord('house','houses','neighborhood','residential','suburb')) {
            const nh = numNear('house', 4);
            json.zones.push({ type: 'residential', count: nh, side: 'east', streetX: 0, startZ: -35, spacing: 14 });
            if (nh > 3) json.zones.push({ type: 'residential', count: Math.ceil(nh/2), side: 'west', streetX: 0, startZ: -25, spacing: 16 });
        }

        // Retail strip / strip mall
        if (hasWord('strip mall','retail','shops','stores','shopping')) {
            json.zones.push({ type: 'retail-strip', position: [-30, 35], stores: numNear('store', 4) });
        }

        // Gas station
        if (hasWord('gas station','fuel','petrol')) {
            json.zones.push({ type: 'gas-station', position: [35, -30] });
        }

        // Parking
        if (hasWord('parking','lot')) {
            json.zones.push({ type: 'parking', position: [30, -45], width: 30, depth: 16, rows: 1, fill: 0.5 });
        }

        // Park
        if (hasWord('park','garden','green space','playground')) {
            const parkPos = hasWord('street','road') ? [35, 30] : [0, 0];
            json.zones.push({ type: 'park', position: parkPos, width: 25+Math.round(sizeScale*10), depth: 25+Math.round(sizeScale*8) });
        }
        if (hasWord('playground','play area','swing','slide')) {
            json.zones.push({ type: 'playground', position: [hasWord('park')?45:0, hasWord('park')?30:0] });
        }

        // Water
        if (hasWord('pond','lake','water','river')) {
            const wPreset = hasWord('ocean','sea')?'ocean':hasWord('tropical')?'tropical':hasWord('murky','swamp')?'murky':hasWord('arctic','frozen','icy')?'arctic':hasWord('river','stream')?'river':'pond';
            json.zones.push({ type: 'water', position: [hasWord('park')?35:-20, hasWord('park')?20:20], width: 15+rng()*10, depth: 10+rng()*8, preset: wPreset });
        }

        // Trees
        if (hasWord('tree','trees','forest','wooded')) {
            const nt = numNear('tree', hasWord('forest','wooded') ? 30 : 10);
            const species = hasWord('pine','evergreen')?'pine':hasWord('palm','tropical')?'palm':hasWord('oak')?'oak':'mixed';
            json.zones.push({ type: 'trees', count: nt, species, region:{x:[-hw+5,hw-5],z:[-hd+5,hd-5]}, clearRadius: hasWord('street','road')?12:0 });
        }

        // Fence
        if (hasWord('fence','fenced')) {
            const fw = hw*0.7, fd = hd*0.7;
            const style = hasWord('wood fence','wooden')?'wood':hasWord('metal','iron')?'metal':'chain';
            json.zones.push({ type: 'fence', path: [[-fw,-fd],[fw,-fd],[fw,fd],[-fw,fd],[-fw,-fd]], height: 2.0, style });
        }

        // Billboard
        if (hasWord('billboard','sign','advertisement')) {
            json.zones.push({ type: 'signage', signs: [{ type:'billboard', position:[-40, -30] }] });
        }

        // ── Auto exterior detail ──
        // Clouds — always for outdoor scenes
        const cloudMood = hasWord('moody','dark','overcast') ? 'moody' : 'outdoor';
        const cloudCount = hasWord('cloudy','overcast') ? 30 : hasWord('clear') ? 8 : 18;
        json.zones.push({ type: 'clouds', count: cloudCount, mood: cloudMood, width: hw*3, depth: hd*3, minHeight: 35, maxHeight: 65 });

        // Rocks
        if (!hasWord('clean','pristine','new')) {
            json.zones.push({ type: 'rocks', count: 15+Math.round(sizeScale*10), region:{ x:[-hw+5,hw-5], z:[-hd+5,hd-5] }, clearRadius: hasWord('street','road')?12:6 });
        }

        // Utility poles along streets
        if (hasWord('street','road','downtown','suburb','neighborhood')) {
            json.zones.push({ type: 'utility-poles', path: [[0,-hd+5],[0,hd-5]], spacing: 25, side: 'right', offset: 10 });
        }

        // Dumpsters near buildings
        if (hasWord('building','store','mall','warehouse','strip')) {
            const dumpPos = [];
            for (let i = 0; i < Math.min(2, Math.ceil(sizeScale)); i++) dumpPos.push([hw*0.5-5+i*12, hd*0.3+i*8]);
            json.zones.push({ type: 'dumpsters', positions: dumpPos });
        }

        // Fire hydrants along sidewalks
        if (hasWord('street','road','sidewalk','downtown','suburb','neighborhood')) {
            const hydPos = [];
            for (let z = -hd+15; z < hd-10; z += 30) hydPos.push([-9, z]);
            json.zones.push({ type: 'hydrants', positions: hydPos });
        }
    }

    // ── EQUIPMENT ──
    const nForklifts = numNear('forklift', 0);
    if (nForklifts > 0 || hasWord('forklift','forklifts','fork lift')) {
        const nf = nForklifts || 2;
        const hd = json.space.depth/2;
        for (let i = 0; i < nf; i++) {
            json.equipment.push({ type: 'forklift', position: [-8+i*8, hd-10-i*4] });
        }
    }

    const nJacks = numNear('pallet jack', numNear('jack', 0));
    if (nJacks > 0 || hasWord('pallet jack')) {
        json.equipment.push({ type: 'pallet-jack', position: [4, 10] });
    }

    if (hasWord('conveyor','belt','conveyor belt')) {
        const hd = json.space.depth/2;
        json.equipment.push({ type: 'conveyor', path: [[12,0.85,hd-3],[0,0.85,hd-3],[-12,0.85,hd-3]], boxes: 8, speed: 1.5 });
    }

    // Vehicles (exterior)
    if (metaType === 'exterior') {
        if (hasWord('car','cars')) {
            const nc = numNear('car', 2);
            for (let i = 0; i < nc; i++) json.equipment.push({ type: 'car', position: [15+i*6, -18-i*3], facing: 'N' });
        }
        if (hasWord('truck')) json.equipment.push({ type: 'truck', position: [-18, 12], facing: 'S' });
        if (hasWord('bus')) json.equipment.push({ type: 'bus', position: [-4, -35], facing: 'N' });
    }

    // ── PEOPLE ──
    if (metaType !== 'exterior') {
        const nWorkers = numNear('worker', numNear('people', numNear('person', 0)));
        if (nWorkers > 0 || hasWord('worker','people','staff')) {
            const nw = nWorkers || 4;
            const inAisles = Math.ceil(nw * 0.6);
            const inOther = nw - inAisles;
            if (inAisles > 0) json.people.push({ area: 'aisles', count: inAisles, type: 'warehouse-worker' });
            if (inOther > 0) json.people.push({ area: 'staging', count: inOther, type: 'warehouse-worker' });
        } else {
            json.people.push({ area: 'aisles', count: 2, type: 'warehouse-worker' });
        }
    } else {
        json.people.push({ area: 'staging', count: 3, type: 'warehouse-worker' });
    }

    // ── CAMERA ──
    if (metaType === 'exterior') {
        json.camera = { start: [0, 1.7, json.space.depth/3], fov: 1.3, speed: 6, far: 300,
            bounds: { min: [-json.space.width/2+2,1.7,-json.space.depth/2+2], max: [json.space.width/2-2,1.7,json.space.depth/2-2] } };
    } else {
        json.camera = { start: 'entrance', speed: 4 };
    }

    // ── HUD ──
    json.hud = { branding: { logo: json.meta.name.split(' ')[0].toUpperCase().substring(0,6), color: '#1a1a2e', accent: '#eab308', subtitle: json.meta.name } };

    console.log('📝 Parsed description → JSON:', json);
    return json;
}


// ══════════════════════════════════════════════════
// DROP ZONE
// ══════════════════════════════════════════════════
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

function handleFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const json = JSON.parse(e.target.result);
            boot(json);
        } catch (err) {
            alert('Invalid JSON: ' + err.message);
        }
    };
    reader.readAsText(file);
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

// Describe button
document.getElementById('describe-btn').addEventListener('click', () => {
    const text = document.getElementById('describe-input').value.trim();
    if (!text) return;
    resetRng(42);
    const json = parseDescription(text);
    boot(json);
});
// Enter key in textarea (shift+enter for newline)
document.getElementById('describe-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('describe-btn').click();
    }
});
// Example chips
document.querySelectorAll('.describe-chip').forEach(chip => {
    chip.addEventListener('click', () => {
        document.getElementById('describe-input').value = chip.dataset.text;
    });
});

</script>
